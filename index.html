              </div>
              <div style={{display:"flex",gap:8,marginBottom:10}}>
                <div style={{flex:1,background:T.bgLight,borderRadius:8,padding:"8px 10px"}}>
                  <p style={{margin:0,fontSize:9,color:T.muted,fontFamily:"monospace",textTransform:"uppercase"}}>Ultimo peso</p>
                  <p style={{margin:"2px 0 0",fontSize:15,color:T.text,fontWeight:700,fontFamily:"monospace"}}>{loading?"...":(ultimo?`${ultimo.valor.weight} kg`:"—")}</p>
                  {diff&&<p style={{margin:"1px 0 0",fontSize:10,fontFamily:"monospace",color:Number(diff)<0?T.success:T.danger}}>{Number(diff)>0?"+":""}{diff} kg</p>}
                </div>
                <div style={{flex:1,background:T.bgLight,borderRadius:8,padding:"8px 10px"}}>
                  <p style={{margin:0,fontSize:9,color:T.muted,fontFamily:"monospace",textTransform:"uppercase"}}>% Gordura</p>
                  <p style={{margin:"2px 0 0",fontSize:15,color:T.text,fontWeight:700,fontFamily:"monospace"}}>{ultimaAval?`${ultimaAval.gordura}%`:"—"}</p>
                  {avalDados&&avalDados.length>1&&<p style={{margin:"1px 0 0",fontSize:10,fontFamily:"monospace",color:(ultimaAval.gordura-avalDados[0].gordura)<0?T.success:T.danger}}>{(ultimaAval.gordura-avalDados[0].gordura)>0?"+":""}{(ultimaAval.gordura-avalDados[0].gordura).toFixed(1)}%</p>}
                </div>
                <div style={{flex:1,background:T.bgLight,borderRadius:8,padding:"8px 10px"}}>
                  <p style={{margin:0,fontSize:9,color:T.muted,fontFamily:"monospace",textTransform:"uppercase"}}>Última aval.</p>
                  <p style={{margin:"2px 0 0",fontSize:11,color:T.text,fontWeight:700}}>{ultimaAval?ultimaAval.data:"—"}</p>
                  <p style={{margin:"1px 0 0",fontSize:10,color:T.muted,fontFamily:"monospace"}}>{avalDados?`${avalDados.length} aval.`:"sem dados"}</p>
                </div>
              </div>
              {/* Botões */}
              <div style={{display:"flex",gap:8,marginBottom:8}}>
                <button onClick={()=>setViewDiario(p)} style={{flex:1,padding:"9px",background:"transparent",border:`1px solid ${T.gold}`,borderRadius:8,color:T.gold,cursor:"pointer",fontSize:12,fontFamily:"monospace",fontWeight:700}}>
                  📓 Diário
                </button>
                <button onClick={()=>setViewFotos(p)} style={{flex:1,padding:"9px",background:"transparent",border:`1px solid ${T.info}`,borderRadius:8,color:T.info,cursor:"pointer",fontSize:12,fontFamily:"monospace",fontWeight:700}}>
                  📸 Fotos
                </button>
              </div>
              <div style={{display:"flex",gap:8,marginBottom:8}}>
                <button onClick={()=>setViewQuiz(p)} style={{flex:1,padding:"9px",background:"transparent",border:`1px solid ${TEAL}`,borderRadius:8,color:TEAL,cursor:"pointer",fontSize:12,fontFamily:"monospace",fontWeight:700}}>
                  📋 Questionários
                </button>
              </div>
              <button onClick={()=>gerarPDF(p)} style={{width:"100%",padding:"10px",background:TEAL,border:"none",borderRadius:8,color:"#fff",cursor:"pointer",fontSize:13,fontFamily:"monospace",fontWeight:700}}>
                🖨️ Gerar Relatório PDF
              </button>
            </div>
          );
        })}
      </div>
    </div>
  );
}


function gerarPDF(patient){
  const aval=patient.id==="rubens"?RUBENS_AVAL:patient.id==="preslavia"?PRESLAVIA_AVAL:null;
  const last=aval?aval[aval.length-1]:null;
  const first=aval?aval[0]:null;
  const altura=patient.id==="rubens"?"183":"158";

  function diffStr(a,b,pos){
    if(a==null||b==null)return"";
    const d=+(b-a).toFixed(1);
    if(d===0)return"";
    const good=pos?d>0:d<0;
    return`<span style="color:${good?"#2a7a2a":"#c0392b"};font-size:10px"> (${d>0?"+":""}${d})</span>`;
  }

  const metaRow=(label,val,unit="",prev=null,pos=false)=>{
    if(val==null)return"";
    return`<tr>
      <td style="background:#2BBFBF;color:#fff;padding:5px 8px;font-weight:700;font-size:11px;width:45%">${label}</td>
      <td style="padding:5px 8px;font-size:12px;font-weight:700;border:1px solid #e0e0e0">${val}${unit?" "+unit:""}${prev!=null?diffStr(prev,val,pos):""}</td>
    </tr>`;
  };

  const planHTML=patient.plan.map(meal=>`
    <div style="margin-bottom:12px">
      <div style="background:#2BBFBF;color:#fff;padding:6px 10px;border-radius:4px 4px 0 0;font-weight:700;font-size:12px">
        ${meal.time} &nbsp;·&nbsp; ${meal.meal}${meal.note?` <span style="font-weight:400;font-size:10px;opacity:0.9">— ${meal.note}</span>`:""}
      </div>
      <div style="border:1px solid #e0e0e0;border-top:none;border-radius:0 0 4px 4px;padding:8px 10px">
        ${meal.options.map((opt,i)=>`
          <div style="margin-bottom:${i<meal.options.length-1?6:0}px">
            <span style="font-size:10px;font-weight:700;color:#2BBFBF">${opt.label}</span>
            <ul style="margin:3px 0 0 16px;padding:0">
              ${opt.items.map(item=>`<li style="font-size:11px;color:#444;margin-bottom:1px">${item}</li>`).join("")}
            </ul>
          </div>
        `).join('<hr style="border:none;border-top:1px dashed #eee;margin:4px 0">')}
      </div>
    </div>
  `).join("");

  const supsHTML=patient.supplements.map(s=>`
    <tr>
      <td style="background:#2BBFBF;color:#fff;padding:5px 8px;font-weight:700;font-size:11px">${s.name}</td>
      <td style="padding:5px 8px;font-size:11px;border:1px solid #e0e0e0">${s.dose}</td>
      <td style="padding:5px 8px;font-size:11px;border:1px solid #e0e0e0;text-align:center">${s.times.join(" · ")}</td>
    </tr>
  `).join("");

  const avalHTML=aval?`
    <div style="page-break-before:always">
      <h2 style="color:#2BBFBF;font-size:16px;border-bottom:2px solid #2BBFBF;padding-bottom:4px;margin-bottom:12px">Avaliação Física</h2>
      <p style="font-size:11px;color:#666;margin:0 0 12px">${altura} cm &nbsp;·&nbsp; ${aval.length} avaliação(ões) &nbsp;·&nbsp; Última: ${last.data}</p>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px">
        ${[
          {l:"Peso",v:last.peso,u:"kg",p:first.peso,pos:false},
          {l:"% Gordura",v:last.gordura,u:"%",p:first.gordura,pos:false},
          {l:"Massa de Gordura",v:last.massaGordura,u:"kg",p:first.massaGordura,pos:false},
          {l:"Massa Livre de Gordura",v:last.massaMagra,u:"kg",p:first.massaMagra,pos:true},
          {l:"IMC",v:last.imc,u:"",p:first.imc,pos:false},
          {l:"RCQ",v:last.rcq,u:"",p:first.rcq,pos:false},
        ].map(s=>`<div style="border:2px solid #2BBFBF;border-radius:6px;padding:8px 10px;text-align:center">
          <p style="margin:0;font-size:9px;color:#888;text-transform:uppercase;letter-spacing:1px">${s.l}</p>
          <p style="margin:4px 0 0;font-size:18px;font-weight:700;color:#2BBFBF;font-family:monospace">${s.v}${s.u?" "+s.u:""}</p>
          ${aval.length>1&&s.p!=null?`<p style="margin:2px 0 0;font-size:10px;color:${s.pos?(s.v-s.p>0?"#2a7a2a":"#c0392b"):(s.v-s.p<0?"#2a7a2a":"#c0392b")}">${s.v-s.p>0?"+":""}${+(s.v-s.p).toFixed(1)} vs inicial</p>`:""}
        </div>`).join("")}
      </div>
      ${aval.length>1?`
      <h3 style="color:#2BBFBF;font-size:13px;margin:0 0 8px">Histórico Completo</h3>
      <table style="width:100%;border-collapse:collapse;font-size:10px">
        <thead>
          <tr style="background:#2BBFBF">
            <th style="color:#fff;padding:5px 6px;text-align:left">Parâmetro</th>
            ${aval.map(d=>`<th style="color:#fff;padding:5px 6px;text-align:center">${d.data}</th>`).join("")}
          </tr>
        </thead>
        <tbody>
          ${["peso","gordura","massaGordura","massaMagra","imc","rcq","somatorio","cintura","quadril","abdomen","bracoRelaxado","bracoContraido","panturrilha"].map(mid=>{
            const m={"peso":"Peso (kg)","gordura":"% Gordura","massaGordura":"M. Gordura (kg)","massaMagra":"M. Magra (kg)","imc":"IMC","rcq":"RCQ","somatorio":"Σ Dobras (mm)","cintura":"Cintura (cm)","quadril":"Quadril (cm)","abdomen":"Abdômen (cm)","bracoRelaxado":"Braço Relax. (cm)","bracoContraido":"Braço Cont. (cm)","panturrilha":"Panturrilha (cm)"}[mid]||mid;
            const vals=aval.map(d=>d[mid]);
            if(vals.every(v=>v==null))return"";
            return`<tr style="border-bottom:1px solid #eee">
              <td style="background:#2BBFBF;color:#fff;padding:4px 6px;font-weight:700;font-size:10px">${m}</td>
              ${vals.map((v,i)=>{
                const prev=vals.slice(0,i).filter(x=>x!=null).pop();
                const d=prev!=null&&v!=null?+(v-prev).toFixed(1):null;
                const posMetric=mid==="massaMagra"||mid==="bracoContraido"||mid==="bracoRelaxado"||mid==="panturrilha";
                const good=d==null||d===0?null:(posMetric?d>0:d<0);
                return`<td style="padding:4px 6px;text-align:center;font-size:10px;font-family:monospace">
                  ${v!=null?v:"—"}${d!=null&&d!==0?`<br><span style="font-size:8px;color:${good?"#2a7a2a":"#c0392b"}">${d>0?"+":""}${d}</span>`:""}
                </td>`;
              }).join("")}
            </tr>`;
          }).join("")}
        </tbody>
      </table>`:""}
    </div>
  `:"";

  const evolHTML=`
    <div style="page-break-before:always">
      <h2 style="color:#2BBFBF;font-size:16px;border-bottom:2px solid #2BBFBF;padding-bottom:4px;margin-bottom:12px">Evolução de Peso</h2>
      <p style="font-size:11px;color:#888;margin:0 0 10px">Registros inseridos pelo paciente no aplicativo.</p>
      <table style="width:100%;border-collapse:collapse;font-size:11px">
        <thead><tr style="background:#2BBFBF"><th style="color:#fff;padding:6px 8px;text-align:left">Data</th><th style="color:#fff;padding:6px 8px;text-align:center">Peso</th><th style="color:#fff;padding:6px 8px;text-align:center">Variação</th></tr></thead>
        <tbody id="pesoRows"><tr><td colspan="3" style="padding:8px;text-align:center;color:#aaa;font-size:11px">Dados sincronizados do app do paciente.</td></tr></tbody>
      </table>
    </div>
  `;

  const html=`<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Relatório — ${patient.name}</title>
<style>
  * { box-sizing:border-box; margin:0; padding:0; }
  body { font-family: Arial, sans-serif; color: #222; background:#fff; padding:20px; font-size:12px; }
  @media print {
    .no-print { display:none !important; }
    body { padding:0; }
    @page { margin:15mm; size:A4; }
  }
</style>
</head>
<body>
  <div class="no-print" style="text-align:right;margin-bottom:16px">
    <button onclick="window.print()" style="background:#2BBFBF;color:#fff;border:none;padding:10px 22px;border-radius:6px;font-size:13px;font-weight:700;cursor:pointer">🖨️ Imprimir / Salvar PDF</button>
  </div>

  <!-- CABEÇALHO -->
  <div style="border:2px solid #2BBFBF;border-radius:8px;padding:14px 18px;margin-bottom:18px;display:flex;justify-content:space-between;align-items:flex-start">
    <div>
      <h1 style="color:#2BBFBF;font-size:22px;font-weight:700;letter-spacing:1px">André Aragão</h1>
      <p style="color:#666;font-size:11px;margin-top:2px">Nutricionista · CRN 11-16678</p>
    </div>
    <div style="text-align:right">
      <p style="font-size:11px;color:#444"><strong>Paciente:</strong> ${patient.name}</p>
      <p style="font-size:11px;color:#444"><strong>Objetivo:</strong> ${patient.goal}</p>
      <p style="font-size:11px;color:#444"><strong>Meta calórica:</strong> ${patient.kcal} kcal/dia</p>
      <p style="font-size:10px;color:#888;margin-top:4px">Gerado em ${new Date().toLocaleDateString("pt-BR")}</p>
    </div>
  </div>

  ${patient.note?`<div style="background:#f0fafa;border-left:4px solid #2BBFBF;border-radius:4px;padding:8px 12px;margin-bottom:16px;font-size:11px;color:#555;font-style:italic">${patient.note}</div>`:""}

  <!-- PLANO ALIMENTAR -->
  <h2 style="color:#2BBFBF;font-size:16px;border-bottom:2px solid #2BBFBF;padding-bottom:4px;margin-bottom:12px">Plano Alimentar</h2>
  ${planHTML}

  <!-- SUPLEMENTAÇÃO -->
  ${patient.supplements.length>0?`
  <h2 style="color:#2BBFBF;font-size:16px;border-bottom:2px solid #2BBFBF;padding-bottom:4px;margin:18px 0 10px">Suplementação</h2>
  <table style="width:100%;border-collapse:collapse">
    <thead><tr style="background:#2BBFBF">
      <th style="color:#fff;padding:6px 8px;text-align:left;font-size:11px">Suplemento</th>
      <th style="color:#fff;padding:6px 8px;text-align:left;font-size:11px">Dose</th>
      <th style="color:#fff;padding:6px 8px;text-align:center;font-size:11px">Horário(s)</th>
    </tr></thead>
    <tbody>${supsHTML}</tbody>
  </table>`:""}

  <!-- AVALIAÇÃO -->
  ${avalHTML}

  <!-- EVOLUÇÃO PESO -->
  ${evolHTML}
</body>
</html>`;

  const w=window.open("","_blank","width=900,height=700");
  w.document.write(html);
  w.document.close();

  // inject peso data from localStorage
  setTimeout(()=>{
    try{
      const key=`peso_${patient.id}`;
      const pesos=JSON.parse(localStorage.getItem(key)||"[]");
      const tbody=w.document.getElementById("pesoRows");
      if(pesos.length>0){
        tbody.innerHTML=pesos.map((e,i)=>{
          const prev=pesos[i-1];
          const diff=prev?+(e.weight-prev.weight).toFixed(1):null;
          const good=diff!=null&&diff<0;
          return`<tr style="border-bottom:1px solid #eee">
            <td style="padding:5px 8px;font-family:monospace">${e.date}</td>
            <td style="padding:5px 8px;text-align:center;font-weight:700;font-family:monospace">${e.weight} kg</td>
            <td style="padding:5px 8px;text-align:center;font-size:11px;color:${diff==null?"#aaa":good?"#2a7a2a":"#c0392b"}">${diff==null?"—":diff>0?"+"+diff+" kg":diff+" kg"}</td>
          </tr>`;
        }).join("");
      }
    }catch(e){}
  },300);
}


// ─── APP ─────────────────────────────────────────────────────────────────────

const TABS=[
  {id:"plano",label:"Plano",icon:"📋"},
  {id:"hoje",label:"Hoje",icon:"✅"},
  {id:"diario",label:"Diário",icon:"📓"},
  {id:"evolucao",label:"Evolução",icon:"📈"},
  {id:"avaliacao",label:"Aval.",icon:"📊"},
  {id:"sups",label:"Supl.",icon:"💊"},
  {id:"quiz",label:"Quiz",icon:"📋"},
  {id:"chat",label:"Chat IA",icon:"💬"}
];

function App(){
  const [theme,setTheme]=useState(()=>store.get("theme")||"light");
  const [user,setUser]=useState("");
  const [senha,setSenha]=useState("");
  const [role,setRole]=useState(null);
  const [patient,setPatient]=useState(null);
  const [error,setError]=useState("");
  const [tab,setTab]=useState("plano");
  const T=THEMES[theme];
  function login(){
    const k=user.toLowerCase().trim().normalize("NFD").replace(/[\u0300-\u036f]/g,"").replace(/\s/g,"");
    const creds=getCreds();const c=creds[k];
    if(c&&senha!==c.senha){setError("Senha incorreta.");return;}
    if(k==="nutri"){setRole("nutri");return;}
    const p=PATIENTS[k];
    if(p){setPatient(p);setRole("patient");setError("");}
    else setError("Usuario nao encontrado.");
  }
  function logout(){setRole(null);setPatient(null);setUser("");setSenha("");setTab("plano");}
  if(!role)return(
    <div style={{minHeight:"100vh",background:T.bg,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:24,position:"relative"}}>
      <button onClick={()=>{const n=theme==="dark"?"light":"dark";setTheme(n);store.set("theme",n);}} style={{position:"absolute",top:20,right:20,background:"none",border:`1px solid ${T.border}`,borderRadius:20,padding:"6px 12px",color:T.muted,cursor:"pointer",fontSize:13}}>{theme==="dark"?"Claro":"Escuro"}</button>
      <div style={{width:"100%",maxWidth:360}}>
        <div style={{textAlign:"center",marginBottom:40}}>
          <h1 style={{color:T.gold,fontSize:28,fontWeight:400,letterSpacing:2}}>Andre Aragao</h1>
          <p style={{color:T.muted,fontSize:12,fontFamily:"monospace",letterSpacing:3,textTransform:"uppercase",marginTop:4}}>Nutricionista · CRN 11-16678</p>
        </div>
        <div style={{background:T.bgMid,borderRadius:20,padding:"32px 28px",border:`1px solid ${T.border}`}}>
          <h2 style={{margin:"0 0 20px",color:T.text,fontSize:18,fontWeight:500,textAlign:"center"}}>Meu Plano Alimentar</h2>
          <div style={{marginBottom:10}}><Input value={user} onChange={e=>setUser(e.target.value)} onKeyDown={e=>e.key==="Enter"&&login()} placeholder="Usuario" T={T} style={{fontSize:15,padding:"13px 16px"}}/></div>
          <div style={{marginBottom:14}}><Input value={senha} onChange={e=>setSenha(e.target.value)} onKeyDown={e=>e.key==="Enter"&&login()} placeholder="Senha" type="password" T={T} style={{fontSize:15,padding:"13px 16px"}}/></div>
          {error&&<p style={{color:T.danger,fontSize:12,margin:"0 0 12px",fontFamily:"monospace"}}>{error}</p>}
          <button onClick={login} style={{width:"100%",padding:"14px",borderRadius:12,background:theme==="dark"?`linear-gradient(135deg,${T.gold},#A67C2E)`:"#1A1A1A",border:"none",color:"#fff",fontSize:15,fontWeight:600,cursor:"pointer"}}>Entrar</button>
        </div>
        <p style={{textAlign:"center",marginTop:16,color:T.muted,fontSize:11,fontFamily:"monospace"}}>preslavia / preslavia123 · rubens / rubens123</p>
      </div>
    </div>
  );
  if(role==="nutri")return <NutriPanel T={T} onLogout={logout}/>;

  return(
    <div style={{minHeight:"100vh",background:T.bg,display:"flex",flexDirection:"column"}}>
      <div style={{background:T.bgMid,borderBottom:`1px solid ${T.border}`,padding:"12px 18px",position:"sticky",top:0,zIndex:50}}>
        <div style={{maxWidth:640,margin:"0 auto",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div><p style={{margin:0,fontSize:14,color:T.gold,fontWeight:600}}>Andre Aragao · Nutricao</p><p style={{margin:0,fontSize:11,color:T.muted,fontFamily:"monospace"}}>{patient.name.split(" ")[0]} · {patient.kcal} kcal/dia</p></div>
          <div style={{display:"flex",gap:8}}>
            <button onClick={()=>{const n=theme==="dark"?"light":"dark";setTheme(n);store.set("theme",n);}} style={{background:"none",border:"none",color:T.muted,cursor:"pointer",fontSize:16}}>{theme==="dark"?"☀":"🌙"}</button>
            <button onClick={logout} style={{background:"none",border:`1px solid ${T.border}`,borderRadius:8,padding:"5px 10px",color:T.muted,cursor:"pointer",fontSize:12,fontFamily:"monospace"}}>Sair</button>
          </div>
        </div>
      </div>
      <div style={{flex:1,maxWidth:640,margin:"0 auto",width:"100%",paddingTop:14}}>
        {tab==="plano"&&<PlanTab patient={patient} T={T}/>}
        {tab==="hoje"&&<TodayTab patient={patient} T={T}/>}
        {tab==="diario"&&<DiarioTab patient={patient} T={T}/>}
        {tab==="evolucao"&&<EvolucaoTab patient={patient} T={T}/>}
        {tab==="avaliacao"&&<AvaliacaoTab patient={patient} T={T}/>}
        {tab==="sups"&&<SupsTab patient={patient} T={T}/>}
        {tab==="quiz"&&<QuestionarioTab patient={patient} T={T}/>}
        {tab==="chat"&&<ChatTab patient={patient} T={T}/>}
      </div>
      <div style={{position:"fixed",bottom:0,left:0,right:0,zIndex:50,background:T.bgMid,borderTop:`1px solid ${T.border}`,padding:"8px 0 14px"}}>
        <div style={{display:"flex",justifyContent:"center",gap:2,maxWidth:640,margin:"0 auto",padding:"0 6px"}}>
          {TABS.map(t=><button key={t.id} onClick={()=>setTab(t.id)} style={{flex:1,background:tab===t.id?`${T.gold}18`:"none",border:tab===t.id?`1px solid ${T.gold}40`:"1px solid transparent",borderRadius:10,cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:3,padding:"5px 4px",color:tab===t.id?T.gold:T.muted}}>
            <span style={{fontSize:16}}>{t.icon}</span>
            <span style={{fontSize:8,fontFamily:"monospace",fontWeight:tab===t.id?700:400,whiteSpace:"nowrap"}}>{t.label}</span>
          </button>)}
        </div>
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
