const db={
  async save(patient_id,tipo,data,valor){
    try{
      await fetch(`${SUPABASE_URL}/rest/v1/registros`,{
        method:"POST",
        headers:{"Content-Type":"application/json","apikey":SUPABASE_KEY,"Authorization":`Bearer ${SUPABASE_KEY}`,"Prefer":"resolution=merge-duplicates"},
        body:JSON.stringify({patient_id,tipo,data,valor})
      });

  async load(patient_id,tipo){
    try{
      const r=await fetch(`${SUPABASE_URL}/rest/v1/registros?patient_id=eq.${patient_id}&tipo=eq.${tipo}&order=data.desc`,{
        headers:{"apikey":SUPABASE_KEY,"Authorization":`Bearer ${SUPABASE_KEY}`}
      });
      return await r.json();
    }catch(e){return[];}
  }
};

// ─── helpers ─────────────────────────────────────────────────────────────────
function s(T,...styles){return Object.assign({fontFamily:"Georgia,serif"},...styles);}

function Btn({children,onClick,variant="primary",style={},T,disabled}){
  const bg=variant==="primary"?T.gold:variant==="danger"?T.danger:"transparent";
  const col=variant==="primary"?"#0D1B2A":"#fff";
  const bor=variant==="ghost"?`1px solid ${T.gold}`:"none";
  return h("button",{onClick,disabled,style:{background:bg,color:col,border:bor,borderRadius:10,padding:"10px 18px",fontSize:13,fontWeight:700,cursor:disabled?"not-allowed":"pointer",opacity:disabled?0.5:1,...style}},children);
}

function Input({value,onChange,placeholder,type="text",style={},T,onKeyDown}){
  return h("input",{value,onChange,placeholder,type,onKeyDown,style:{background:T.bgLight,border:`1px solid ${T.border}`,borderRadius:10,padding:"11px 14px",color:T.text,fontSize:14,outline:"none",width:"100%",boxSizing:"border-box",...style},
    onFocus:e=>e.target.style.borderColor=T.gold,
    onBlur:e=>e.target.style.borderColor=T.border});
}

function Label({children,T}){return h("p",{style:{margin:"0 0 6px",fontSize:10,color:T.gold,fontFamily:"monospace",letterSpacing:2,textTransform:"uppercase"}},children);}

function Card({children,style={},T}){
  return h("div",{style:{background:T.bgMid,border:`1px solid ${T.border}`,borderRadius:14,position:"relative",overflow:"hidden",...style}},
    h("div",{style:{position:"absolute",left:0,top:0,bottom:0,width:3,background:T.gold}}),
    children);
}

// ─── MealCard ────────────────────────────────────────────────────────────────
function MealCard({meal,T}){
  const [open,setOpen]=useState(false);
  const [sel,setSel]=useState(0);
  const multi=meal.options.length>1;
  const cur=meal.options[sel];
  return h("div",{style:{background:T.bgMid,border:`1px solid ${T.border}`,borderRadius:14,marginBottom:11,overflow:"hidden"}},
    h("div",{style:{padding:"13px 16px 10px",cursor:multi?"pointer":"default"},onClick:()=>multi&&setOpen(!open)},
      h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center"}},
        h("div",null,
          h("p",{style:{margin:0,fontSize:10,color:T.gold,fontFamily:"monospace",letterSpacing:2,textTransform:"uppercase"}},meal.time),
          h("h3",{style:{margin:"2px 0 0",color:T.text,fontSize:15,fontWeight:700}},meal.meal),
          meal.note&&h("p",{style:{margin:"2px 0 0",fontSize:11,color:T.muted,fontStyle:"italic"}},meal.note)
        ),
        multi&&h("span",{style:{color:T.gold,fontSize:14,display:"inline-block",transform:open?"rotate(180deg)":"none",transition:"0.2s"}},open?"▲":"▼")
      )
    ),
    (open||!multi)&&h("div",{style:{padding:"0 16px 13px"}},
      multi&&h("div",{style:{display:"flex",flexWrap:"wrap",gap:5,marginBottom:10}},
        ...meal.options.map((o,i)=>h("button",{key:i,onClick:()=>setSel(i),style:{padding:"3px 10px",borderRadius:20,fontSize:10,fontFamily:"monospace",cursor:"pointer",border:`1px solid ${sel===i?T.gold:T.border}`,background:sel===i?T.gold:"transparent",color:sel===i?"#0D1B2A":T.muted,fontWeight:sel===i?700:400}},o.label))
      ),
      h("ul",{style:{margin:0,paddingLeft:18}},
        ...cur.items.map((item,i)=>h("li",{key:i,style:{color:T.muted,fontSize:13,marginBottom:3}},item))
      )
    ),

// ─── TodayTab ────────────────────────────────────────────────────────────────
function TodayTab({patient,T}){
  const ck=`hoje_${patient.id}_${todayStr()}`;
  const wk=`agua_${patient.id}_${todayStr()}`;
  const [checked,setChecked]=useState(()=>store.get(ck)||{});
  const [water,setWater]=useState(()=>store.get(wk)||0);
  function toggle(m){const n={...checked,[m]:!checked[m]};setChecked(n);store.set(ck,n);}
  function addWater(ml){const n=Math.min(water+ml,patient.waterGoal+1000);setWater(n);store.set(wk,n);}
  const done=patient.plan.filter(m=>checked[m.meal]).length;
  const pct=Math.round((done/patient.plan.length)*100);
  const wpct=Math.min(Math.round((water/patient.waterGoal)*100),100);
  return h("div",{style:{padding:"0 14px 80px"}},
    h("div",{style:{display:"flex",gap:10,marginBottom:14}},
      ...[{label:"Refeições",value:`${done}/${patient.plan.length}`,pct,color:pct===100?T.success:T.gold},{label:"Água",value:`${(water/1000).toFixed(1)}L`,pct:wpct,color:wpct>=100?T.success:T.info}].map((s,i)=>
        h("div",{key:i,style:{flex:1,background:T.bgMid,border:`1px solid ${T.border}`,borderRadius:12,padding:"10px 12px"}},
          h("p",{style:{margin:0,fontSize:10,color:T.muted,fontFamily:"monospace",textTransform:"uppercase"}},s.label),
          h("p",{style:{margin:"0 0 6px",fontSize:15,color:s.color,fontWeight:700,fontFamily:"monospace"}},s.value),
          h("div",{style:{height:4,background:T.bgLight,borderRadius:2,overflow:"hidden"}},
            h("div",{style:{width:`${s.pct}%`,height:"100%",background:s.color,borderRadius:2,transition:"width .4s"}})
          )
        )
      )
    ),
    ...patient.plan.map(meal=>
      h("div",{key:meal.meal,onClick:()=>toggle(meal.meal),style:{display:"flex",alignItems:"center",gap:12,background:checked[meal.meal]?`${T.success}18`:T.bgMid,border:`1px solid ${checked[meal.meal]?T.success:T.border}`,borderRadius:12,padding:"12px 14px",cursor:"pointer",marginBottom:10,transition:"all .2s"}},
        h("div",{style:{width:22,height:22,borderRadius:"50%",flexShrink:0,border:`2px solid ${checked[meal.meal]?T.success:T.border}`,background:checked[meal.meal]?T.success:"transparent",display:"flex",alignItems:"center",justifyContent:"center",fontSize:12,color:"#fff"}},checked[meal.meal]?"✓":""),
        h("div",{style:{flex:1}},
          h("p",{style:{margin:0,fontSize:10,color:T.gold,fontFamily:"monospace",textTransform:"uppercase"}},meal.time),
          h("p",{style:{margin:"1px 0 0",fontSize:14,color:checked[meal.meal]?T.muted:T.text,textDecoration:checked[meal.meal]?"line-through":"none"}},meal.meal)
        )
      )
    ),
    h(Card,{T,style:{marginTop:18,padding:"14px 18px"}},
      h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}},
        h("p",{style:{margin:0,fontSize:13,color:T.text,fontWeight:700}},"Hidratação"),
        h("p",{style:{margin:0,fontSize:22,color:water>=patient.waterGoal?T.success:T.gold,fontFamily:"monospace",fontWeight:700}},`${(water/1000).toFixed(1)}L`)
      ),
      h("div",{style:{height:8,background:T.bgLight,borderRadius:4,overflow:"hidden",marginBottom:12}},
        h("div",{style:{width:`${wpct}%`,height:"100%",background:water>=patient.waterGoal?T.success:T.info,borderRadius:4,transition:"width .4s"}})
      ),
      h("div",{style:{display:"flex",gap:8}},
        ...[200,300,500].map(ml=>h("button",{key:ml,onClick:()=>addWater(ml),style:{flex:1,padding:"8px 0",background:T.bgLight,border:`1px solid ${T.border}`,borderRadius:8,color:T.text,fontSize:13,cursor:"pointer",fontFamily:"monospace"}},`+${ml}ml`)),
        h("button",{onClick:()=>{setWater(0);store.set(wk,0);},style:{padding:"8px 12px",background:"transparent",border:`1px solid ${T.danger}`,borderRadius:8,color:T.danger,fontSize:12,cursor:"pointer"}},"✕")
      )
    )
  );
}

  const [fSatiety,setFSatiety]=useState(2);
  const [fMood,setFMood]=useState("neutro");
  const [fPhoto,setFPhoto]=useState(null);
  const [fObs,setFObs]=useState("");

  function resetForm(){setFMeal("");setFTime(new Date().toTimeString().slice(0,5));setFDesc("");setFHunger(2);setFSatiety(2);setFMood("neutro");setFPhoto(null);setFObs("");setEditId(null);}
  function openNew(){resetForm();setShowForm(true);}
  function openEdit(e){setFMeal(e.meal);setFTime(e.time);setFDesc(e.desc);setFHunger(e.hunger);setFSatiety(e.satiety);setFMood(e.mood);setFPhoto(e.photo||null);setFObs(e.obs||"");setEditId(e.id);setShowForm(true);}

  function save(){
    if(!fDesc.trim()&&!fPhoto)return;

    h("div",{style:{marginBottom:14}},
      h(Label,{T},"Foto (opcional)"),

        h("button",{onClick:()=>setFPhoto(null),style:{position:"absolute",top:6,right:6,background:"rgba(0,0,0,0.6)",border:"none",borderRadius:"50%",width:26,height:26,color:"#fff",cursor:"pointer",fontSize:14}},"×")

  );

        const isToday=d===todayStr();
        const label=isToday?"Hoje":d.slice(5).split("-").reverse().join("/");

// ─── EvolucaoTab ─────────────────────────────────────────────────────────────
function EvolucaoTab({patient,T}){
  const key=`peso_${patient.id}`;
  const [entries,setEntries]=useState(()=>store.get(key)||[]);
  const [wInput,setWInput]=useState("");
  const [syncing,setSyncing]=useState(false);
  useEffect(()=>{
    db.load(patient.id,"peso").then(rows=>{
      if(rows&&rows.length>0){const data=rows.map(r=>r.valor).sort((a,b)=>a.date.localeCompare(b.date));setEntries(data);store.set(key,data);}
    });
  },[]);
  async function add(){
    const v=parseFloat(wInput.replace(",","."));
    if(isNaN(v)||v<30||v>300)return;
    const entry={date:todayStr(),weight:v};
    const n=[...entries.filter(e=>e.date!==todayStr()),entry].sort((a,b)=>a.date.localeCompare(b.date));
    setEntries(n);store.set(key,n);setWInput("");
    setSyncing(true);await db.save(patient.id,"peso",todayStr(),entry);setSyncing(false);
  }
  function remove(i){const n=entries.filter((_,idx)=>idx!==i);setEntries(n);store.set(key,n);}
  const last=entries[entries.length-1];const first=entries[0];
  const diff=entries.length>1?(last.weight-first.weight).toFixed(1):null;
  return h("div",{style:{padding:"0 14px 80px"}},
    syncing&&h("p",{style:{textAlign:"center",color:T.muted,fontSize:11,fontFamily:"monospace",marginBottom:8}},"Salvando..."),
    entries.length>0&&h("div",{style:{display:"flex",gap:10,marginBottom:14}},
      ...[{label:"Atual",value:`${last.weight} kg`},{label:"Inicial",value:`${first.weight} kg`},{label:"Variação",value:diff?`${diff>0?"+":""}${diff} kg`:"—",color:Number(diff)<0?T.success:T.danger}].map((s,i)=>
        h("div",{key:i,style:{flex:1,background:T.bgMid,borderRadius:10,padding:"10px 12px",border:`1px solid ${T.border}`}},
          h("p",{style:{margin:0,fontSize:10,color:T.muted,fontFamily:"monospace",textTransform:"uppercase"}},s.label),
          h("p",{style:{margin:"3px 0 0",color:s.color||T.text,fontSize:14,fontWeight:700}},s.value)
        )
      )
    ),
    h(Card,{T,style:{marginBottom:14,padding:"14px 16px"}},
      h(Label,{T},"Registrar peso"),
      h("div",{style:{display:"flex",gap:8,margin:"8px 0"}},
        h(Input,{value:wInput,onChange:e=>setWInput(e.target.value),placeholder:"Ex: 68.5",type:"number",T,style:{flex:1},onKeyDown:e=>e.key==="Enter"&&add()}),
        h("span",{style:{display:"flex",alignItems:"center",color:T.muted,fontSize:14,fontFamily:"monospace"}},"kg")
      ),
      h(Btn,{onClick:add,T,style:{width:"100%"}},"+ Registrar")
    ),
    ...[...entries].reverse().map((e,i)=>
      h("div",{key:i,style:{display:"flex",justifyContent:"space-between",alignItems:"center",background:T.bgMid,borderRadius:10,padding:"10px 14px",marginBottom:8,border:`1px solid ${T.border}`}},
        h("div",null,
          h("p",{style:{margin:0,fontSize:11,color:T.muted,fontFamily:"monospace"}},e.date),
          h("p",{style:{margin:"2px 0 0",fontSize:16,color:T.text,fontWeight:700,fontFamily:"monospace"}},`${e.weight} kg`)
        ),
        h("button",{onClick:()=>remove(entries.length-1-i),style:{background:"none",border:"none",color:T.muted,cursor:"pointer",fontSize:16}},"✕")
      )
    )
  );
}

function weekStr(){
  const d=new Date();const day=d.getDay();
  const diff=d.getDate()-day+(day===0?-6:1);
  const mon=new Date(new Date().setDate(diff));
  return mon.toISOString().slice(0,10);
}

async function callClaude(messages,system){
  const body={model:"claude-sonnet-4-20250514",max_tokens:1000,messages};
  if(system)body.system=system;
  try{
    const r=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(body)});
    const d=await r.json();
    return d.content?.find(b=>b.type==="text")?.text||"Desculpe, não consegui responder agora.";
  }catch(e){return "Erro de conexão. Tente novamente.";}
}

  function login(){
    const k=user.toLowerCase().trim().normalize("NFD").replace(/[\u0300-\u036f]/g,"").replace(/\s/g,"");
    const creds=getCreds();const c=creds[k];
    if(c&&senha!==c.senha){setError("Senha incorreta.");return;}
    if(k==="nutri"){setRole("nutri");return;}
    const p=PATIENTS[k];
    if(p){setPatient(p);setRole("patient");setError("");}
    else setError("Usuário não encontrado.");
  }
  function logout(){setRole(null);setPatient(null);setUser("");setSenha("");setTab("plano");}

  if(!role)return h("div",{style:{minHeight:"100vh",background:T.bg,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:24,position:"relative"}},
    h("button",{onClick:()=>{const n=theme==="dark"?"light":"dark";setTheme(n);store.set("theme",n);},style:{position:"absolute",top:20,right:20,background:"none",border:`1px solid ${T.border}`,borderRadius:20,padding:"6px 12px",color:T.muted,cursor:"pointer",fontSize:13}},theme==="dark"?"Claro":"Escuro"),
    h("div",{style:{width:"100%",maxWidth:360}},
      h("div",{style:{textAlign:"center",marginBottom:40}},
        h("h1",{style:{color:T.gold,fontSize:28,fontWeight:400,letterSpacing:2}},"André Aragão"),
        h("p",{style:{color:T.muted,fontSize:12,fontFamily:"monospace",letterSpacing:3,textTransform:"uppercase",marginTop:4}},"Nutricionista · CRN 11-16678")
      ),
      h("div",{style:{background:T.bgMid,borderRadius:20,padding:"32px 28px",border:`1px solid ${T.border}`}},
        h("h2",{style:{margin:"0 0 20px",color:T.text,fontSize:18,fontWeight:500,textAlign:"center"}},"Meu Plano Alimentar"),
        h("div",{style:{marginBottom:10}},h(Input,{value:user,onChange:e=>setUser(e.target.value),onKeyDown:e=>e.key==="Enter"&&login(),placeholder:"Usuário",T,style:{fontSize:15,padding:"13px 16px"}})),
        h("div",{style:{marginBottom:14}},h(Input,{value:senha,onChange:e=>setSenha(e.target.value),onKeyDown:e=>e.key==="Enter"&&login(),placeholder:"Senha",type:"password",T,style:{fontSize:15,padding:"13px 16px"}})),
        error&&h("p",{style:{color:T.danger,fontSize:12,margin:"0 0 12px",fontFamily:"monospace"}},error),
        h("button",{onClick:login,style:{width:"100%",padding:"14px",borderRadius:12,background:theme==="dark"?`linear-gradient(135deg,${T.gold},#A67C2E)`:"#1A1A1A",border:"none",color:"#fff",fontSize:15,fontWeight:600,cursor:"pointer"}},"Entrar")
      ),
      null
    )
  );

  if(role==="nutri")return h(NutriPanel,{T,onLogout:logout});

  return h("div",{style:{minHeight:"100vh",background:T.bg,display:"flex",flexDirection:"column"}},
    h("div",{style:{background:T.bgMid,borderBottom:`1px solid ${T.border}`,padding:"12px 18px",position:"sticky",top:0,zIndex:50}},
      h("div",{style:{maxWidth:640,margin:"0 auto",display:"flex",justifyContent:"space-between",alignItems:"center"}},
        h("div",null,
          h("p",{style:{margin:0,fontSize:14,color:T.gold,fontWeight:600}},"André Aragão · Nutrição"),
          h("p",{style:{margin:0,fontSize:11,color:T.muted,fontFamily:"monospace"}},`${patient.name.split(" ")[0]} · ${patient.kcal} kcal/dia`)
        ),
        h("div",{style:{display:"flex",gap:8}},
          h("button",{onClick:()=>{const n=theme==="dark"?"light":"dark";setTheme(n);store.set("theme",n);},style:{background:"none",border:"none",color:T.muted,cursor:"pointer",fontSize:16}},theme==="dark"?"☀":"🌙"),
          h("button",{onClick:logout,style:{background:"none",border:`1px solid ${T.border}`,borderRadius:8,padding:"5px 10px",color:T.muted,cursor:"pointer",fontSize:12,fontFamily:"monospace"}},"Sair")
        )
      )
    ),
    h("div",{style:{flex:1,maxWidth:640,margin:"0 auto",width:"100%",paddingTop:14}},
      tab==="plano"&&h(PlanTab,{patient,T}),
      tab==="hoje"&&h(TodayTab,{patient,T}),
      tab==="diario"&&h(DiarioTab,{patient,T}),
      tab==="evolucao"&&h(EvolucaoTab,{patient,T}),
      tab==="avaliacao"&&h(AvaliacaoTab,{patient,T}),
      tab==="sups"&&h(SupsTab,{patient,T}),
      tab==="quiz"&&h(QuestionarioTab,{patient,T}),
      tab==="chat"&&h(ChatTab,{patient,T})
    ),
    h("div",{style:{position:"fixed",bottom:0,left:0,right:0,zIndex:50,background:T.bgMid,borderTop:`1px solid ${T.border}`,padding:"8px 0 14px"}},
      h("div",{style:{display:"flex",justifyContent:"center",gap:2,maxWidth:640,margin:"0 auto",padding:"0 6px"}},
        ...TABS.map(t=>h("button",{key:t.id,onClick:()=>setTab(t.id),style:{flex:1,background:tab===t.id?`${T.gold}18`:"none",border:tab===t.id?`1px solid ${T.gold}40`:"1px solid transparent",borderRadius:10,cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:3,padding:"5px 2px",color:tab===t.id?T.gold:T.muted}},
          h("span",{style:{fontSize:15}},t.icon),
          h("span",{style:{fontSize:8,fontFamily:"monospace",fontWeight:tab===t.id?700:400,whiteSpace:"nowrap"}},t.label)
        ))
      )
    )
  );
}

(function(){
  var attempts=0;
  function startApp(){
    attempts++;
    var rootEl=document.getElementById("root");
    if(typeof React==="undefined"||typeof ReactDOM==="undefined"){
      if(attempts>100){
        rootEl.innerHTML='<div style="padding:40px;text-align:center;font-family:Georgia,serif;color:#8A5E1E"><p style="font-size:18px;margin-bottom:8px">André Aragão</p><p style="font-size:12px;color:#C0392B">Erro: React não carregou. Verifique sua conexão.</p></div>';
        return;
      }
      setTimeout(startApp,100);return;
    }
    try{
      ReactDOM.createRoot(rootEl).render(React.createElement(App));
    }catch(e){
      rootEl.innerHTML='<div style="padding:40px;font-family:monospace;font-size:12px;color:#C0392B;word-break:break-all">Erro JS: '+e.message+'<br><br>'+e.stack+'</div>';
    }
  }
  if(document.readyState==="loading"){
    document.addEventListener("DOMContentLoaded",startApp);
  } else {
    startApp();
  }
})();

</script>
<script>
if("serviceWorker" in navigator){window.addEventListener("load",()=>{navigator.serviceWorker.register("sw.js").catch(()=>{});});}
</script>
