const SUPABASE_URL="https://zeeilatvbpcnrfckpcub.supabase.co";
const SUPABASE_KEY="sb_publishable_aoC-hKQSuGUMJZrCJMdChQ_SBQRkGIh";

const db={
  async save(patient_id,tipo,data,valor){
    try{
      await fetch(`${SUPABASE_URL}/rest/v1/registros`,{
        method:"POST",
        headers:{"Content-Type":"application/json","apikey":SUPABASE_KEY,"Authorization":`Bearer ${SUPABASE_KEY}`,"Prefer":"resolution=merge-duplicates"},
        body:JSON.stringify({patient_id,tipo,data,valor})
      });
    }catch(e){}
  },
  async load(patient_id,tipo){
    try{
      const r=await fetch(`${SUPABASE_URL}/rest/v1/registros?patient_id=eq.${patient_id}&tipo=eq.${tipo}&order=data.desc`,{
        headers:{"apikey":SUPABASE_KEY,"Authorization":`Bearer ${SUPABASE_KEY}`}
      });
      return await r.json();
    }catch(e){return[];}
  }
};

// ─── helpers ─────────────────────────────────────────────────────────────────
function s(T,...styles){return Object.assign({fontFamily:"Georgia,serif"},...styles);}

function Btn({children,onClick,variant="primary",style={},T,disabled}){
  const bg=variant==="primary"?T.gold:variant==="danger"?T.danger:"transparent";
  const col=variant==="primary"?"#0D1B2A":"#fff";
  const bor=variant==="ghost"?`1px solid ${T.gold}`:"none";
  return h("button",{onClick,disabled,style:{background:bg,color:col,border:bor,borderRadius:10,padding:"10px 18px",fontSize:13,fontWeight:700,cursor:disabled?"not-allowed":"pointer",opacity:disabled?0.5:1,...style}},children);
}

function Input({value,onChange,placeholder,type="text",style={},T,onKeyDown}){
  return h("input",{value,onChange,placeholder,type,onKeyDown,style:{background:T.bgLight,border:`1px solid ${T.border}`,borderRadius:10,padding:"11px 14px",color:T.text,fontSize:14,outline:"none",width:"100%",boxSizing:"border-box",...style},
    onFocus:e=>e.target.style.borderColor=T.gold,
    onBlur:e=>e.target.style.borderColor=T.border});
}

function Label({children,T}){return h("p",{style:{margin:"0 0 6px",fontSize:10,color:T.gold,fontFamily:"monospace",letterSpacing:2,textTransform:"uppercase"}},children);}

function Card({children,style={},T}){
  return h("div",{style:{background:T.bgMid,border:`1px solid ${T.border}`,borderRadius:14,position:"relative",overflow:"hidden",...style}},
    h("div",{style:{position:"absolute",left:0,top:0,bottom:0,width:3,background:T.gold}}),
    children);
}

// ─── MealCard ────────────────────────────────────────────────────────────────
function MealCard({meal,T,isCurrent,isPast}){
  const [open,setOpen]=useState(isCurrent);
  const [sel,setSel]=useState(0);
  const multi=meal.options.length>1;
  const cur=meal.options[sel];

  const borderColor=isCurrent?T.gold:isPast?`${T.success}60`:`${T.border}`;
  const bgColor=isCurrent?`${T.gold}0A`:isPast?`${T.success}06`:T.bgMid;
  const accentBar=isCurrent?T.gold:isPast?T.success:T.border;

  return h("div",{style:{background:bgColor,border:`1px solid ${borderColor}`,borderRadius:16,marginBottom:10,overflow:"hidden",transition:"all .2s",position:"relative"}},
    // Barra lateral colorida
    h("div",{style:{position:"absolute",left:0,top:0,bottom:0,width:3,background:accentBar,borderRadius:"3px 0 0 3px"}}),
    h("div",{style:{padding:"14px 16px 12px 18px",cursor:"pointer"},onClick:()=>multi&&setOpen(!open)},
      h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}},
        h("div",{style:{flex:1}},
          h("div",{style:{display:"flex",alignItems:"center",gap:8,marginBottom:3}},
            h("span",{style:{fontSize:10,color:isCurrent?T.gold:T.muted,fontFamily:"monospace",letterSpacing:2,textTransform:"uppercase",fontWeight:isCurrent?700:400}},meal.time),
            isCurrent&&h("span",{style:{fontSize:9,background:T.gold,color:"#0D1B2A",padding:"2px 7px",borderRadius:20,fontFamily:"monospace",fontWeight:700,letterSpacing:1}},"AGORA")
          ),
          h("h3",{style:{margin:0,color:isPast?T.muted:T.text,fontSize:15,fontWeight:700,textDecoration:isPast?"line-through":"none",textDecorationColor:`${T.muted}60`}},meal.meal),

// ─── PlanTab ──────────────────────────────────────────────────────────────────
function PlanTab({patient,T,currentIdx}){
  const now=new Date();
  const nowMin=now.getHours()*60+now.getMinutes();
  const times=patient.plan.map(m=>{const[hh,mm]=m.time.split(":").map(Number);return hh*60+mm;});
  if(currentIdx===undefined){
    currentIdx=times.findIndex((t,i)=>{const next=times[i+1]||24*60;return nowMin>=t&&nowMin<next;});
    if(nowMin<times[0])currentIdx=-1;
  }
  const currentMeal=patient.plan[currentIdx]||patient.plan[0];

  return h("div",{style:{padding:"0 0 10px"}},

    // Nota clínica
    patient.note&&h("div",{style:{margin:"16px 16px 0",background:T.bgMid,border:`1px solid ${T.border}`,borderRadius:14,padding:"12px 14px",display:"flex",gap:10,alignItems:"flex-start"}},
      h("svg",{width:14,height:14,viewBox:"0 0 24 24",fill:"none",stroke:T.gold,strokeWidth:2,style:{flexShrink:0,marginTop:1}},
        h("circle",{cx:12,cy:12,r:10}),h("line",{x1:12,y1:8,x2:12,y2:12}),h("line",{x1:12,y1:16,x2:"12.01",y2:16})
      ),
      h("p",{style:{margin:0,fontSize:12,color:T.muted,fontStyle:"italic",lineHeight:1.6}},patient.note)
    ),

    // Card de destaque — refeição atual
    currentMeal&&h("div",{style:{margin:"16px 16px 0",borderRadius:18,padding:"20px",position:"relative",overflow:"hidden",background:"linear-gradient(135deg,#1A2E42 0%,#0D1B2A 100%)"}},
      h("div",{style:{position:"absolute",top:-20,right:-20,width:100,height:100,borderRadius:"50%",background:"rgba(201,168,76,0.08)",pointerEvents:"none"}}),
      h("div",{style:{position:"absolute",bottom:-30,right:20,width:60,height:60,borderRadius:"50%",background:"rgba(201,168,76,0.05)",pointerEvents:"none"}}),
      h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:14}},
        h("div",null,
          h("div",{style:{display:"flex",alignItems:"center",gap:8,marginBottom:6}},
            currentIdx>=0&&h("span",{style:{fontSize:9,background:"#C9A84C",color:"#0D1B2A",padding:"3px 9px",borderRadius:20,fontFamily:"monospace",fontWeight:700,letterSpacing:1}},"AGORA"),
            h("span",{style:{fontSize:11,color:"rgba(201,168,76,0.7)",fontFamily:"monospace",letterSpacing:1}},currentMeal.time)
          ),
          h("h2",{style:{margin:0,fontSize:22,fontWeight:700,color:"#F0EAD6",letterSpacing:-0.3}},currentMeal.meal)
        ),
        h("div",{style:{background:"rgba(201,168,76,0.15)",borderRadius:12,padding:"10px",display:"flex",alignItems:"center",justifyContent:"center"}},
          h("svg",{width:22,height:22,viewBox:"0 0 24 24",fill:"none",stroke:"#C9A84C",strokeWidth:1.8,strokeLinecap:"round"},
            h("path",{d:"M3 2v7c0 1.1.9 2 2 2h4a2 2 0 0 0 2-2V2"}),
            h("path",{d:"M7 2v20"}),
            h("path",{d:"M21 15V2a5 5 0 0 0-5 5v6c0 1.1.9 2 2 2h3zm0 0v7"})
          )
        )
      ),
      currentMeal.note&&h("p",{style:{margin:"0 0 12px",fontSize:12,color:"rgba(201,168,76,0.6)",fontStyle:"italic"}},currentMeal.note),
      h("div",{style:{borderTop:"1px solid rgba(255,255,255,0.08)",paddingTop:12}},
        h("p",{style:{margin:"0 0 8px",fontSize:10,color:"rgba(255,255,255,0.3)",fontFamily:"monospace",letterSpacing:2,textTransform:"uppercase"}},"Opção 1 — itens"),
        h("div",{style:{display:"flex",flexDirection:"column",gap:6}},
          ...currentMeal.options[0].items.map((item,i)=>
            h("div",{key:i,style:{display:"flex",alignItems:"center",gap:8}},
              h("div",{style:{width:4,height:4,borderRadius:"50%",background:"rgba(201,168,76,0.5)",flexShrink:0}}),
              h("span",{style:{fontSize:13,color:"rgba(240,234,214,0.75)",lineHeight:1.4}},item)
            )
          )
        )
      )
    ),

    // Lista completa
    h("div",{style:{padding:"20px 16px 0"}},
      h("p",{style:{margin:"0 0 12px",fontSize:10,color:T.muted,fontFamily:"monospace",letterSpacing:3,textTransform:"uppercase"}},"Todas as refeições"),
      ...patient.plan.map((meal,i)=>h(MealCard,{key:i,meal,T,isCurrent:i===currentIdx,isPast:i<currentIdx}))
    )
  );
}


// ─── TodayTab ────────────────────────────────────────────────────────────────
function TodayTab({patient,T}){
  const ck=`hoje_${patient.id}_${todayStr()}`;
  const wk=`agua_${patient.id}_${todayStr()}`;
  const [checked,setChecked]=useState(()=>store.get(ck)||{});
  const [water,setWater]=useState(()=>store.get(wk)||0);
  function toggle(m){const n={...checked,[m]:!checked[m]};setChecked(n);store.set(ck,n);}
  function addWater(ml){const n=Math.min(water+ml,patient.waterGoal+1000);setWater(n);store.set(wk,n);}
  const done=patient.plan.filter(m=>checked[m.meal]).length;
  const pct=Math.round((done/patient.plan.length)*100);
  const wpct=Math.min(Math.round((water/patient.waterGoal)*100),100);
  return h("div",{style:{padding:"0 14px 80px"}},
    h("div",{style:{display:"flex",gap:10,marginBottom:14}},
      ...[{label:"Refeições",value:`${done}/${patient.plan.length}`,pct,color:pct===100?T.success:T.gold},{label:"Água",value:`${(water/1000).toFixed(1)}L`,pct:wpct,color:wpct>=100?T.success:T.info}].map((s,i)=>
        h("div",{key:i,style:{flex:1,background:T.bgMid,border:`1px solid ${T.border}`,borderRadius:12,padding:"10px 12px"}},
          h("p",{style:{margin:0,fontSize:10,color:T.muted,fontFamily:"monospace",textTransform:"uppercase"}},s.label),
          h("p",{style:{margin:"0 0 6px",fontSize:15,color:s.color,fontWeight:700,fontFamily:"monospace"}},s.value),
          h("div",{style:{height:4,background:T.bgLight,borderRadius:2,overflow:"hidden"}},
            h("div",{style:{width:`${s.pct}%`,height:"100%",background:s.color,borderRadius:2,transition:"width .4s"}})
          )
        )
      )
    ),
    ...patient.plan.map(meal=>
      h("div",{key:meal.meal,onClick:()=>toggle(meal.meal),style:{display:"flex",alignItems:"center",gap:12,background:checked[meal.meal]?`${T.success}18`:T.bgMid,border:`1px solid ${checked[meal.meal]?T.success:T.border}`,borderRadius:12,padding:"12px 14px",cursor:"pointer",marginBottom:10,transition:"all .2s"}},
        h("div",{style:{width:22,height:22,borderRadius:"50%",flexShrink:0,border:`2px solid ${checked[meal.meal]?T.success:T.border}`,background:checked[meal.meal]?T.success:"transparent",display:"flex",alignItems:"center",justifyContent:"center",fontSize:12,color:"#fff"}},checked[meal.meal]?"✓":""),
        h("div",{style:{flex:1}},
          h("p",{style:{margin:0,fontSize:10,color:T.gold,fontFamily:"monospace",textTransform:"uppercase"}},meal.time),
          h("p",{style:{margin:"1px 0 0",fontSize:14,color:checked[meal.meal]?T.muted:T.text,textDecoration:checked[meal.meal]?"line-through":"none"}},meal.meal)
        )
      )
    ),
    h(Card,{T,style:{marginTop:18,padding:"14px 18px"}},
      h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}},
        h("p",{style:{margin:0,fontSize:13,color:T.text,fontWeight:700}},"Hidratação"),
        h("p",{style:{margin:0,fontSize:22,color:water>=patient.waterGoal?T.success:T.gold,fontFamily:"monospace",fontWeight:700}},`${(water/1000).toFixed(1)}L`)
      ),
      h("div",{style:{height:8,background:T.bgLight,borderRadius:4,overflow:"hidden",marginBottom:12}},
        h("div",{style:{width:`${wpct}%`,height:"100%",background:water>=patient.waterGoal?T.success:T.info,borderRadius:4,transition:"width .4s"}})
      ),
      h("div",{style:{display:"flex",gap:8}},
        ...[200,300,500].map(ml=>h("button",{key:ml,onClick:()=>addWater(ml),style:{flex:1,padding:"8px 0",background:T.bgLight,border:`1px solid ${T.border}`,borderRadius:8,color:T.text,fontSize:13,cursor:"pointer",fontFamily:"monospace"}},`+${ml}ml`)),
        h("button",{onClick:()=>{setWater(0);store.set(wk,0);},style:{padding:"8px 12px",background:"transparent",border:`1px solid ${T.danger}`,borderRadius:8,color:T.danger,fontSize:12,cursor:"pointer"}},"✕")
      )
    )
  );
}

// ─── EvolucaoTab ─────────────────────────────────────────────────────────────
function EvolucaoTab({patient,T}){
  const key=`peso_${patient.id}`;
  const [entries,setEntries]=useState(()=>store.get(key)||[]);
  const [wInput,setWInput]=useState("");
  const [syncing,setSyncing]=useState(false);
  useEffect(()=>{
    db.load(patient.id,"peso").then(rows=>{
      if(rows&&rows.length>0){const data=rows.map(r=>r.valor).sort((a,b)=>a.date.localeCompare(b.date));setEntries(data);store.set(key,data);}
    });
  },[]);
  async function add(){
    const v=parseFloat(wInput.replace(",","."));
    if(isNaN(v)||v<30||v>300)return;
    const entry={date:todayStr(),weight:v};
    const n=[...entries.filter(e=>e.date!==todayStr()),entry].sort((a,b)=>a.date.localeCompare(b.date));
    setEntries(n);store.set(key,n);setWInput("");
    setSyncing(true);await db.save(patient.id,"peso",todayStr(),entry);setSyncing(false);
  }
  function remove(i){const n=entries.filter((_,idx)=>idx!==i);setEntries(n);store.set(key,n);}
  const last=entries[entries.length-1];const first=entries[0];
  const diff=entries.length>1?(last.weight-first.weight).toFixed(1):null;
  return h("div",{style:{padding:"0 14px 80px"}},
    syncing&&h("p",{style:{textAlign:"center",color:T.muted,fontSize:11,fontFamily:"monospace",marginBottom:8}},"Salvando..."),
    entries.length>0&&h("div",{style:{display:"flex",gap:10,marginBottom:14}},
      ...[{label:"Atual",value:`${last.weight} kg`},{label:"Inicial",value:`${first.weight} kg`},{label:"Variação",value:diff?`${diff>0?"+":""}${diff} kg`:"—",color:Number(diff)<0?T.success:T.danger}].map((s,i)=>
        h("div",{key:i,style:{flex:1,background:T.bgMid,borderRadius:10,padding:"10px 12px",border:`1px solid ${T.border}`}},
          h("p",{style:{margin:0,fontSize:10,color:T.muted,fontFamily:"monospace",textTransform:"uppercase"}},s.label),
          h("p",{style:{margin:"3px 0 0",color:s.color||T.text,fontSize:14,fontWeight:700}},s.value)
        )
      )
    ),
    h(Card,{T,style:{marginBottom:14,padding:"14px 16px"}},
      h(Label,{T},"Registrar peso"),
      h("div",{style:{display:"flex",gap:8,margin:"8px 0"}},
        h(Input,{value:wInput,onChange:e=>setWInput(e.target.value),placeholder:"Ex: 68.5",type:"number",T,style:{flex:1},onKeyDown:e=>e.key==="Enter"&&add()}),
        h("span",{style:{display:"flex",alignItems:"center",color:T.muted,fontSize:14,fontFamily:"monospace"}},"kg")
      ),
      h(Btn,{onClick:add,T,style:{width:"100%"}},"+ Registrar")
    ),
    ...[...entries].reverse().map((e,i)=>
      h("div",{key:i,style:{display:"flex",justifyContent:"space-between",alignItems:"center",background:T.bgMid,borderRadius:10,padding:"10px 14px",marginBottom:8,border:`1px solid ${T.border}`}},
        h("div",null,
          h("p",{style:{margin:0,fontSize:11,color:T.muted,fontFamily:"monospace"}},e.date),
          h("p",{style:{margin:"2px 0 0",fontSize:16,color:T.text,fontWeight:700,fontFamily:"monospace"}},`${e.weight} kg`)
        ),
        h("button",{onClick:()=>remove(entries.length-1-i),style:{background:"none",border:"none",color:T.muted,cursor:"pointer",fontSize:16}},"✕")
      )
    )
  );
}

        )

// ─── InBodyTab para Rebeca ────────────────────────────────────────────────────
function InBodyTab({patient,T}){
  const dados=REBECA_AVAL;
  const [tabIdx,setTabIdx]=useState(dados.length-1);
  const [showAll,setShowAll]=useState(false);
  const d=dados[tabIdx];
  const prev=tabIdx>0?dados[tabIdx-1]:null;
  function delta(key,inv){
    if(!prev)return null;
    const diff=+(d[key]-prev[key]).toFixed(1);
    if(diff===0)return null;
    const good=inv?(diff<0):(diff>0);
    return {diff,good};
  }
  function DeltaBadge({k,inv}){
    const r=delta(k,inv);
    if(!r)return null;
    return h("span",{style:{
      fontSize:9,fontWeight:700,fontFamily:"monospace",
      color:r.good?T.success:T.danger,
      marginLeft:4
    }},r.diff>0?`+${r.diff}`:r.diff);
  }
  // bar: value between min and max, fill color
  function SegBar({val,min,max,good,T}){
    const pct=Math.max(0,Math.min(100,((val-min)/(max-min))*100));
    const color=good?"#4CAF7D":val>max?"#E07B7B":"#4A9ECC";
    return h("div",{style:{position:"relative",height:6,background:T.bgLight,borderRadius:3,overflow:"visible",flexGrow:1,margin:"0 6px"}},
      h("div",{style:{position:"absolute",left:`${pct}%`,top:-2,width:10,height:10,borderRadius:"50%",background:color,border:"2px solid #fff",transform:"translateX(-50%)",boxShadow:"0 1px 4px rgba(0,0,0,.3)"}}),
      h("div",{style:{position:"absolute",left:0,top:0,height:6,width:`${pct}%`,background:color+"55",borderRadius:3}})
    );
  }
  const last=dados[dados.length-1];
  const first=dados[0];
  const totalDays=Math.round((new Date(last.data.split("/").reverse().join("-"))-new Date(first.data.split("/").reverse().join("-")))/(1000*86400));
  const pesoGain=+(last.peso-first.peso).toFixed(1);
  const mlgGain=+(last.mlg-first.mlg).toFixed(1);
  const gcDrop=+(first.gc-last.gc).toFixed(1);
  // date selector — show last 6 or all
  const visible=showAll?dados:[...dados].slice(-6);
  return h("div",{style:{padding:"0 14px 90px"}},
    // ── Header InBody ──
    h("div",{style:{background:"linear-gradient(135deg,#1A2E42,#0D1B2A)",borderRadius:14,padding:"14px 16px",marginBottom:12,border:`1px solid ${TEAL}55`}},
      h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}},
        h("div",null,
          h("p",{style:{margin:0,fontSize:10,color:TEAL,fontFamily:"monospace",fontWeight:700,letterSpacing:2,textTransform:"uppercase"}},"Relatório InBody"),
          h("p",{style:{margin:"4px 0 2px",fontSize:17,color:"#fff",fontWeight:700}},patient.name),
          h("p",{style:{margin:0,fontSize:10,color:"rgba(255,255,255,.6)",fontFamily:"monospace"}},"158 cm · 27 anos · Fem.")
        ),
        h("div",{style:{textAlign:"right"}},
          h("p",{style:{margin:0,fontSize:9,color:"rgba(255,255,255,.5)",fontFamily:"monospace"}},"AVALIAÇÃO"),
          h("p",{style:{margin:"2px 0",fontSize:14,color:TEAL,fontWeight:700,fontFamily:"monospace"}},d.data),
          h("p",{style:{margin:0,fontSize:9,color:"rgba(255,255,255,.5)",fontFamily:"monospace"}}),
        )
      ),
      // timeline journey summary
      h("div",{style:{display:"flex",gap:8,marginTop:12}},
        ...[
          {l:"Acomp.",v:`${totalDays}d`,icon:"📅"},
          {l:"Peso",v:`${pesoGain>0?"+":""}${pesoGain} kg`,icon:"⚖️",c:pesoGain<3?"#4CAF7D":"#C9A84C"},
          {l:"M.Magra",v:`+${mlgGain} kg`,icon:"💪",c:"#4CAF7D"},
          {l:"% Gord.",v:`-${gcDrop}%`,icon:"🔥",c:gcDrop>0?"#4CAF7D":"#E07B7B"}
        ].map((s,i)=>h("div",{key:i,style:{flex:1,background:"rgba(255,255,255,.06)",borderRadius:8,padding:"6px 4px",textAlign:"center"}},
          h("p",{style:{margin:0,fontSize:14}},s.icon),
          h("p",{style:{margin:"2px 0",fontSize:10,fontWeight:700,color:s.c||"#fff",fontFamily:"monospace"}},s.v),
          h("p",{style:{margin:0,fontSize:8,color:"rgba(255,255,255,.5)",fontFamily:"monospace"}},s.l)
        ))
      )
    ),
    // ── Date selector ──
    h("div",{style:{marginBottom:12}},
      h("div",{style:{display:"flex",gap:4,overflowX:"auto",paddingBottom:2,alignItems:"center"}},
        ...visible.map((av,i)=>{
          const realIdx=dados.indexOf(av);
          const isCur=realIdx===tabIdx;
          return h("button",{key:realIdx,onClick:()=>setTabIdx(realIdx),style:{
            flexShrink:0,padding:"4px 10px",borderRadius:16,fontSize:9,fontFamily:"monospace",
            cursor:"pointer",border:`1px solid ${isCur?TEAL:T.border}`,

    h("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,marginBottom:12}},

          h("p",{style:{margin:0,fontSize:9,color:T.muted}},s.unit),
          r&&h("p",{style:{margin:"4px 0 0",fontSize:10,fontWeight:700,fontFamily:"monospace",color:r.good?T.success:T.danger}},
            r.diff>0?`+${r.diff}`:`${r.diff}`," vs ant."

    h("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,marginBottom:12}},
      ...[
        {l:"IMC",v:d.imc,ref:"18.5–24.9",ok:d.imc>=18.5&&d.imc<=24.9},
        {l:"% Gordura",v:`${d.gc}%`,ref:"15–23%",ok:d.gc>=15&&d.gc<=23},
        {l:"RCQ",v:d.rcq,ref:"<0.80",ok:d.rcq<0.80}
      ].map((s,i)=>h("div",{key:i,style:{
        background:T.bgMid,borderRadius:10,padding:"10px 8px",textAlign:"center",
        border:`2px solid ${s.ok?T.success+"88":T.danger+"88"}`
      }},
        h("p",{style:{margin:0,fontSize:8,color:T.muted,fontFamily:"monospace",textTransform:"uppercase"}},(s.l)),
        h("p",{style:{margin:"4px 0 0",fontSize:18,color:s.ok?T.success:T.danger,fontWeight:700,fontFamily:"monospace"}},s.v),
        h("p",{style:{margin:"2px 0 0",fontSize:8,color:T.muted,fontFamily:"monospace"}},`Ref: ${s.ref}`)
      ))
    ),
    // ── Circunferências com barra estilo InBody ──
    h("div",{style:{background:T.bgMid,border:`1px solid ${T.border}`,borderRadius:14,padding:"14px 16px",marginBottom:12}},
      h("p",{style:{margin:"0 0 12px",fontSize:11,fontWeight:700,color:T.text,fontFamily:"monospace",textTransform:"uppercase",letterSpacing:1}},"📏 Circunferências"),
      ...[
        {l:"Pescoço",k:"pescoco",val:d.pescoco,min:26,max:40,unit:"cm",inv:false},
        {l:"Cintura",k:"cintura",val:d.cintura,min:60,max:80,unit:"cm",inv:true,good:d.cintura<80},
        {l:"Abdômen",k:"abdomen",val:d.abdomen,min:60,max:85,unit:"cm",inv:true,good:d.abdomen<80},
        {l:"Quadril",k:"quadril",val:d.quadril,min:85,max:120,unit:"cm",inv:false},
        {l:"Braço",k:"braco",val:d.braco,min:20,max:40,unit:"cm",inv:false,good:true},
        {l:"Coxa Med.",k:"coxaMed",val:d.coxaMed,min:40,max:72,unit:"cm",inv:false},
        {l:"Panturrilha",k:"panturrilha",val:d.panturrilha,min:28,max:42,unit:"cm",inv:false,good:true}
      ].map((s,i)=>{
        const r=delta(s.k,s.inv||false);
        const pct=Math.max(0,Math.min(100,((s.val-s.min)/(s.max-s.min))*100));
        const barColor=s.good!=null?( s.good?T.success:T.danger):TEAL;
        return h("div",{key:i,style:{marginBottom:10}},
          h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:3}},
            h("span",{style:{fontSize:11,color:T.muted,fontFamily:"monospace"}},s.l),
            h("div",{style:{display:"flex",alignItems:"center",gap:4}},
              h("span",{style:{fontSize:13,fontWeight:700,color:T.text,fontFamily:"monospace"}},`${s.val} ${s.unit}`),
              r&&h("span",{style:{fontSize:9,fontWeight:700,fontFamily:"monospace",color:r.good?T.success:T.danger}},r.diff>0?`+${r.diff}`:`${r.diff}`)
            )
          ),
          h("div",{style:{position:"relative",height:8,background:T.bgLight,borderRadius:4,overflow:"hidden"}},
            h("div",{style:{position:"absolute",left:0,top:0,height:"100%",width:`${pct}%`,background:`linear-gradient(90deg,${barColor}88,${barColor})`,borderRadius:4,transition:"width .4s"}})
          )
        );
      })
    ),
    // ── Dobras cutâneas ──
    h("div",{style:{background:T.bgMid,border:`1px solid ${T.border}`,borderRadius:14,padding:"14px 16px",marginBottom:12}},
      h("p",{style:{margin:"0 0 12px",fontSize:11,fontWeight:700,color:T.text,fontFamily:"monospace",textTransform:"uppercase",letterSpacing:1}},"📌 Dobras Cutâneas  (Pollock 7)"),
      h("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:12}},
        ...[
          {l:"Triceptal",v:d.tri,k:"tri"},
          {l:"Subescapular",v:d.sub,k:"sub"},
          {l:"Abdominal",v:d.abd,k:"abd"},
          {l:"Coxa",v:d.cxa,k:"cxa"},
          {l:"Suprailiaca",v:d.sup,k:"sup"},
          {l:"Axilar Med.",v:d.axl,k:"axl"},
          {l:"Torácica",v:d.tor,k:"tor"}
        ].map((s,i)=>{
          const r=delta(s.k,true);
          return h("div",{key:i,style:{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"7px 10px",background:T.bgLight,borderRadius:8}},
            h("span",{style:{fontSize:11,color:T.muted,fontFamily:"monospace"}},s.l),
            h("div",{style:{display:"flex",alignItems:"center",gap:4}},
              h("span",{style:{fontSize:13,fontWeight:700,color:T.text,fontFamily:"monospace"}},`${s.v} mm`),
              r&&h("span",{style:{fontSize:9,fontWeight:700,fontFamily:"monospace",color:r.good?T.success:T.danger}},r.diff>0?`+${r.diff}`:`${r.diff}`)
            )
          );
        })
      ),
      // Somatório
      h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"10px 12px",background:`${TEAL}18`,borderRadius:10,border:`1px solid ${TEAL}44`}},
        h("span",{style:{fontSize:12,fontWeight:700,color:T.text,fontFamily:"monospace"}},"Σ Somatório"),
        h("div",{style:{display:"flex",alignItems:"center",gap:4}},
          h("span",{style:{fontSize:16,fontWeight:700,color:TEAL,fontFamily:"monospace"}},`${d.soma} mm`),
          (()=>{const r=delta("soma",true);return r&&h("span",{style:{fontSize:9,fontWeight:700,fontFamily:"monospace",color:r.good?T.success:T.danger}},r.diff>0?`+${r.diff}`:`${r.diff}`);})()
        )
      )
    ),
    // ── Evolução — mini cards últimas avaliações ──
    h("div",{style:{background:T.bgMid,border:`1px solid ${T.border}`,borderRadius:14,padding:"14px 16px",marginBottom:12}},
      h("p",{style:{margin:"0 0 12px",fontSize:11,fontWeight:700,color:T.text,fontFamily:"monospace",textTransform:"uppercase",letterSpacing:1}},"📈 Evolução geral"),
      h("div",{style:{overflowX:"auto"}},
        h("table",{style:{width:"100%",borderCollapse:"collapse",fontSize:10,fontFamily:"monospace",minWidth:500}},
          h("thead",null,
            h("tr",{style:{background:`${TEAL}22`}},
              ...[["Data","","left"],["Peso","kg","center"],["G%","%","center"],["MLG","kg","center"],["Cintura","cm","center"],["Σ","mm","center"]].map(([l,u,a],i)=>
                h("td",{key:i,style:{padding:"6px 8px",color:TEAL,fontWeight:700,textAlign:a,borderBottom:`2px solid ${TEAL}`,whiteSpace:"nowrap"}},l)
              )
            )
          ),
          h("tbody",null,
            ...[...dados].reverse().slice(0,8).map((row,i)=>{
              const pi=dados.indexOf(row);const prev2=pi>0?dados[pi-1]:null;
              const isPast=pi<dados.length-1;
              const isCurrent=pi===dados.length-1;
              return h("tr",{key:i,style:{
                borderBottom:`1px solid ${T.border}`,
                background:isCurrent?`${TEAL}14`:"transparent"
              }},
                h("td",{style:{padding:"5px 8px",color:isCurrent?TEAL:T.muted,fontWeight:isCurrent?700:400}},row.data.slice(0,5)),
                ...[
                  {v:row.peso,k:"peso",inv:true},
                  {v:row.gc,k:"gc",inv:true,suf:"%"},
                  {v:row.mlg,k:"mlg",inv:false},
                  {v:row.cintura,k:"cintura",inv:true},
                  {v:row.soma,k:"soma",inv:true}
                ].map((f,j)=>{
                  const pd=prev2?.[f.k];
                  const dd=pd!=null?+(row[f.k]-pd).toFixed(1):null;
                  const good=dd==null||dd===0?null:(f.inv?dd<0:dd>0);
                  return h("td",{key:j,style:{padding:"5px 8px",textAlign:"center",color:isCurrent?T.text:T.muted,fontWeight:isCurrent?700:400}},
                    `${f.v}${f.suf||""}`,
                    dd!=null&&dd!==0&&h("span",{style:{fontSize:8,color:good?T.success:T.danger,marginLeft:2,display:"block"}},`${dd>0?"+":""}${dd}`)
                  );
                })
              );
            })
          )
        )
      )
    )
  );
}

function SupsTab({patient,T}){
  const key=`sups_${patient.id}_${todayStr()}`;
  const [taken,setTaken]=useState(()=>store.get(key)||{});
  function toggle(id){const n={...taken,[id]:!taken[id]};setTaken(n);store.set(key,n);}
  return h("div",{style:{padding:"0 14px 80px"}},
    ...patient.supplements.flatMap((s,i)=>s.times.map((t,j)=>{
      const id=`${i}_${j}`;const done=taken[id];
      return h("div",{key:id,onClick:()=>toggle(id),style:{display:"flex",alignItems:"center",gap:12,background:done?`${T.success}18`:T.bgMid,border:`1px solid ${done?T.success:T.border}`,borderRadius:12,padding:"12px 14px",cursor:"pointer",marginBottom:10,transition:"all .2s"}},
        h("div",{style:{width:22,height:22,borderRadius:"50%",flexShrink:0,border:`2px solid ${done?T.success:T.border}`,background:done?T.success:"transparent",display:"flex",alignItems:"center",justifyContent:"center",fontSize:12,color:"#fff"}},done?"✓":""),
        h("div",{style:{flex:1}},
          h("p",{style:{margin:0,fontSize:10,color:T.gold,fontFamily:"monospace",textTransform:"uppercase"}},t),
          h("p",{style:{margin:"2px 0 0",fontSize:14,color:done?T.muted:T.text,fontWeight:700,textDecoration:done?"line-through":"none"}},s.name),
          h("p",{style:{margin:"1px 0 0",fontSize:12,color:T.muted}},s.dose)
        )
      );
    }))
  );
}

async function callClaude(messages,system){
  const body={model:"claude-sonnet-4-6",max_tokens:1000,messages};
  if(system)body.system=system;
  try{
    const r=await fetch("https://nutriandre-proxy.vercel.app/api/chat",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(body)});
    const d=await r.json();
    return d.content?.find(b=>b.type==="text")?.text||"Desculpe, não consegui responder agora.";
  }catch(e){return "Erro de conexão. Tente novamente.";}
}

    const file=e.target.files[0];
    if(!file)return;

    reader.readAsDataURL(file);

  function getMealContext(){
    const now=new Date();
    const mins=now.getHours()*60+now.getMinutes();
    let closest=patient.plan[0],minDiff=Infinity;
    patient.plan.forEach(function(m){
      const p=m.time.split(":").map(Number);

          +'"kcal_estimado":0,"proteina_estimada":0,"aderencia":85,'
          +'"status":"OTIMA","feedback":"2-3 frases empáticas e específicas","pontos_positivos":["item"],"pontos_atencao":["item"],'
          +'"dica":"1 dica prática para a próxima refeição"}';

          +"Objetivo: "+patient.goal+" | "+patient.kcal+" kcal/dia\n\n"
          +"Plano previsto:\n"+planStr+"\n\n"
          +"Identifique os alimentos, estime as porções e avalie a aderência ao plano. "
          +"Seja específico com o que você vê na foto.";
      }else{
        system='Você é nutricionista especialista em análise de rótulos. Retorne SOMENTE JSON puro:\n'
          +'{"produto":"nome","porcao":"porção","macros":{"calorias":0,"proteinas":0,"carboidratos":0,"gorduras":0,"sodio":0,"fibras":0},'

        userText="Analise este rótulo para "+patient.name.split(" ")[0]+", objetivo: "+patient.goal+", "+patient.kcal+" kcal/dia.";
      }

// ─── getWeekKey ───────────────────────────────────────────────────────────────
function getWeekKey(){
  var d=new Date();
  d=new Date(Date.UTC(d.getFullYear(),d.getMonth(),d.getDate()));
  var day=d.getUTCDay()||7;
  d.setUTCDate(d.getUTCDate()+4-day);
  var y=d.getUTCFullYear();
  var s=new Date(Date.UTC(y,0,1));
  var wk=Math.ceil(((d-s)/86400000+1)/7);
  return y+"-W"+(wk<10?"0":"")+wk;
}
// ─── QuestionarioTab ─────────────────────────────────────────────────────────
function QuestionarioTab({patient,T}){
  const semKey="quiz_"+patient.id+"_"+getWeekKey();
  const saved=store.get(semKey)||{};
  const [respostas,setRespostas]=useState(saved._submitted?saved:{});
  const [etapa,setEtapa]=useState(saved._insights?"resultado":"quiz");
  const [insights,setInsights]=useState(saved._insights||null);
  function responder(id,valor){
    setRespostas(function(p){const n=Object.assign({},p);n[id]=valor;return n;});
  }
  const respondidas=PERGUNTAS.filter(function(p){
    return respostas[p.id]!==undefined&&respostas[p.id]!=="";
  }).length;
  const isCompleto=respondidas===PERGUNTAS.length;
  const progresso=Math.round((respondidas/PERGUNTAS.length)*100);
  async function enviar(){
    if(!isCompleto)return;
    setEtapa("loading");
    const quizData=Object.assign({},respostas,{_submitted:true,semana:getWeekKey()});
    store.set(semKey,quizData);
    try{await db.save(patient.id,"quiz",todayStr(),quizData);}catch(e){}
    // Coletar dados reais dos últimos 7 dias
    let totalRef=0,totalAgua=0;
    for(let i=0;i<7;i++){
      const d=new Date();d.setDate(d.getDate()-i);
      const ds=d.toISOString().slice(0,10);

    const mRef=(totalRef/7).toFixed(1);
    const mAg=(totalAgua/7/1000).toFixed(1);
    const pAd=Math.round((totalRef/7/patient.plan.length)*100);

              {label:"Último peso",value:loading?"...":(ultimo?`${ultimo.valor?.weight||"—"} kg`:"—")},
              {label:"% Gordura",value:ultimaAval?`${ultimaAval.gordura}%`:"—"},
              {label:"Última aval.",value:ultimaAval?ultimaAval.data:"—"}
            ].map((s,i)=>
              h("div",{key:i,style:{flex:1,background:T.bgLight,borderRadius:8,padding:"8px 10px"}},
                h("p",{style:{margin:0,fontSize:9,color:T.muted,fontFamily:"monospace",textTransform:"uppercase"}},s.label),
                h("p",{style:{margin:"2px 0 0",fontSize:13,color:T.text,fontWeight:700,fontFamily:"monospace"}},s.value)
              )
            )
          )
        );
      })
    )
  );
}

function App(){
  const [theme,setTheme]=useState(()=>store.get("theme")||"light");
  const [user,setUser]=useState("");
  const [senha,setSenha]=useState("");
  const [role,setRole]=useState(null);
  const [patient,setPatient]=useState(null);
  const [error,setError]=useState("");
  const [tab,setTab]=useState("plano");
  const T=THEMES[theme];
  function login(){
    const k=user.toLowerCase().trim().normalize("NFD").replace(/[\u0300-\u036f]/g,"").replace(/\s/g,"");
    const creds=getCreds();const c=creds[k];
    if(c&&senha!==c.senha){setError("Senha incorreta.");return;}
    if(k==="nutri"){setRole("nutri");return;}
    const p=PATIENTS[k];
    if(p){setPatient(p);setRole("patient");setError("");}

  const now=new Date();
  const nowMin=now.getHours()*60+now.getMinutes();
  const times=patient.plan.map(m=>{const[hh,mm]=m.time.split(":").map(Number);return hh*60+mm;});
  let currentIdx=times.findIndex((t,i)=>{const next=times[i+1]||24*60;return nowMin>=t&&nowMin<next;});
  if(nowMin<times[0])currentIdx=-1;
  const currentMeal=patient.plan[currentIdx]||patient.plan[0];
  // dias da semana
  const diasSemana=["D","S","T","Q","Q","S","S"];
  const hoje=now.getDay();
  const ckHoje=`hoje_${patient.id}_${now.toISOString().slice(0,10)}`;
  const checkedHoje=store.get(ckHoje)||{};
  const refeicoesFeitasHoje=patient.plan.filter(m=>checkedHoje[m.meal]).length;

            )
          )
        ),
        // dias da semana
        h("div",{style:{display:"flex",gap:4,paddingBottom:14}},
          diasSemana.map((d,i)=>{
            const isHoje=i===hoje;
            const isPast=i<hoje;
            return h("div",{key:i,style:{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:4}},

      tab==="sups"&&h(SupsTab,{patient,T}),
      tab==="quiz"&&h(QuestionarioTab,{patient,T}),
      tab==="chat"&&h(ChatTab,{patient,T})

        ))
      )
    )
