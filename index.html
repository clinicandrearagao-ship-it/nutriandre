function Btn({children,onClick,variant="primary",style={},T,disabled}){
  const bg=variant==="primary"?T.gold:variant==="danger"?T.danger:"transparent";
  const col=variant==="primary"?"#0D1B2A":"#fff";
  const bor=variant==="ghost"?`1px solid ${T.gold}`:"none";
  return <button onClick={onClick} disabled={disabled} style={{background:bg,color:col,border:bor,borderRadius:10,padding:"10px 18px",fontSize:13,fontWeight:700,cursor:disabled?"not-allowed":"pointer",opacity:disabled?0.5:1,...style}}>{children}</button>;
}
function Input({value,onChange,placeholder,type="text",style={},T,onKeyDown}){
  return <input value={value} onChange={onChange} placeholder={placeholder} type={type} onKeyDown={onKeyDown} style={{background:T.bgLight,border:`1px solid ${T.border}`,borderRadius:10,padding:"11px 14px",color:T.text,fontSize:14,outline:"none",width:"100%",boxSizing:"border-box",...style}} onFocus={e=>e.target.style.borderColor=T.gold} onBlur={e=>e.target.style.borderColor=T.border}/>;
}
function Label({children,T}){return <p style={{margin:"0 0 6px",fontSize:10,color:T.gold,fontFamily:"monospace",letterSpacing:2,textTransform:"uppercase"}}>{children}</p>;}
function Card({children,style={},T}){return <div style={{background:T.bgMid,border:`1px solid ${T.border}`,borderRadius:14,position:"relative",overflow:"hidden",...style}}><div style={{position:"absolute",left:0,top:0,bottom:0,width:3,background:T.gold}}/>{children}</div>;}

function MealCard({meal,T}){
  const [open,setOpen]=useState(false);
  const [sel,setSel]=useState(0);
  const multi=meal.options.length>1;
  const cur=meal.options[sel];
  return(
    <div style={{background:T.bgMid,border:`1px solid ${T.border}`,borderRadius:14,marginBottom:11,overflow:"hidden"}}>
      <div style={{padding:"13px 16px 10px",cursor:multi?"pointer":"default"}} onClick={()=>multi&&setOpen(!open)}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div>
            <p style={{margin:0,fontSize:10,color:T.gold,fontFamily:"monospace",letterSpacing:2,textTransform:"uppercase"}}>{meal.time}</p>
            <h3 style={{margin:"2px 0 0",color:T.text,fontSize:15,fontWeight:700}}>{meal.meal}</h3>
            {meal.note&&<p style={{margin:"2px 0 0",fontSize:11,color:T.muted,fontStyle:"italic"}}>{meal.note}</p>}
          </div>
          {multi&&<span style={{color:T.gold,fontSize:16,display:"inline-block",transform:open?"rotate(180deg)":"none",transition:"0.2s"}}>v</span>}
        </div>
      </div>
      {(open||!multi)&&(
        <div style={{padding:"0 16px 13px"}}>
          {multi&&<div style={{display:"flex",flexWrap:"wrap",gap:5,marginBottom:10}}>{meal.options.map((o,i)=><button key={i} onClick={()=>setSel(i)} style={{padding:"3px 10px",borderRadius:20,fontSize:10,fontFamily:"monospace",cursor:"pointer",border:`1px solid ${sel===i?T.gold:T.border}`,background:sel===i?T.gold:"transparent",color:sel===i?"#0D1B2A":T.muted,fontWeight:sel===i?700:400}}>{o.label}</button>)}</div>}
          <ul style={{margin:0,paddingLeft:18}}>{cur.items.map((item,i)=><li key={i} style={{color:T.muted,fontSize:13,marginBottom:3}}>{item}</li>)}</ul>
        </div>
      )}
      {!open&&multi&&<p style={{margin:"0 16px 10px",fontSize:11,color:T.muted,fontFamily:"monospace"}}>{meal.options.length} opcoes · toque para ver</p>}
    </div>
  );
}

function PlanTab({patient,T}){

      {patient.plan.map((meal,i)=><MealCard key={i} meal={meal} T={T}/>)}

}

  function toggle(m){const n={...checked,[m]:!checked[m]};setChecked(n);store.set(ck,n);}
  function addWater(ml){const n=Math.min(water+ml,patient.waterGoal+1000);setWater(n);store.set(wk,n);}
  const done=patient.plan.filter(m=>checked[m.meal]).length;
  const pct=Math.round((done/patient.plan.length)*100);
  const wpct=Math.min(Math.round((water/patient.waterGoal)*100),100);
  return(
    <div style={{padding:"0 14px 80px"}}>
      <div style={{display:"flex",gap:10,marginBottom:14}}>
        {[{label:"Refeicoes",value:`${done}/${patient.plan.length}`,pct,color:pct===100?T.success:T.gold},{label:"Agua",value:`${(water/1000).toFixed(1)}L`,pct:wpct,color:wpct>=100?T.success:T.info}].map((s,i)=>(
          <div key={i} style={{flex:1,background:T.bgMid,border:`1px solid ${T.border}`,borderRadius:12,padding:"10px 12px"}}>
            <p style={{margin:0,fontSize:10,color:T.muted,fontFamily:"monospace",textTransform:"uppercase"}}>{s.label}</p>
            <p style={{margin:"0 0 6px",fontSize:15,color:s.color,fontWeight:700,fontFamily:"monospace"}}>{s.value}</p>
            <div style={{height:4,background:T.bgLight,borderRadius:2,overflow:"hidden"}}><div style={{width:`${s.pct}%`,height:"100%",background:s.color,borderRadius:2,transition:"width .4s"}}/></div>
          </div>
        ))}
      </div>
      {patient.plan.map((meal)=>(
        <div key={meal.meal} onClick={()=>toggle(meal.meal)} style={{display:"flex",alignItems:"center",gap:12,background:checked[meal.meal]?`${T.success}18`:T.bgMid,border:`1px solid ${checked[meal.meal]?T.success:T.border}`,borderRadius:12,padding:"12px 14px",cursor:"pointer",marginBottom:10,transition:"all .2s"}}>
          <div style={{width:22,height:22,borderRadius:"50%",flexShrink:0,border:`2px solid ${checked[meal.meal]?T.success:T.border}`,background:checked[meal.meal]?T.success:"transparent",display:"flex",alignItems:"center",justifyContent:"center",fontSize:12,color:"#fff"}}>{checked[meal.meal]?"v":""}</div>
          <div style={{flex:1}}>
            <p style={{margin:0,fontSize:10,color:T.gold,fontFamily:"monospace",textTransform:"uppercase"}}>{meal.time}</p>
            <p style={{margin:"1px 0 0",fontSize:14,color:checked[meal.meal]?T.muted:T.text,textDecoration:checked[meal.meal]?"line-through":"none"}}>{meal.meal}</p>
          </div>
        </div>
      ))}
      <Card T={T} style={{marginTop:18,padding:"14px 18px"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
          <p style={{margin:0,fontSize:13,color:T.text,fontWeight:700}}>Hidratacao</p>
          <p style={{margin:0,fontSize:22,color:water>=patient.waterGoal?T.success:T.gold,fontFamily:"monospace",fontWeight:700}}>{(water/1000).toFixed(1)}L</p>
        </div>
        <div style={{height:8,background:T.bgLight,borderRadius:4,overflow:"hidden",marginBottom:12}}><div style={{width:`${wpct}%`,height:"100%",background:water>=patient.waterGoal?T.success:T.info,borderRadius:4,transition:"width .4s"}}/></div>
        <div style={{display:"flex",gap:8}}>
          {[200,300,500].map(ml=><button key={ml} onClick={()=>addWater(ml)} style={{flex:1,padding:"8px 0",background:T.bgLight,border:`1px solid ${T.border}`,borderRadius:8,color:T.text,fontSize:13,cursor:"pointer",fontFamily:"monospace"}}>+{ml}ml</button>)}
          <button onClick={()=>{setWater(0);store.set(wk,0);}} style={{padding:"8px 12px",background:"transparent",border:`1px solid ${T.danger}`,borderRadius:8,color:T.danger,fontSize:12,cursor:"pointer"}}>X</button>
        </div>
      </Card>
    </div>
  );
}

function EvolucaoTab({patient,T}){
  const key=`peso_${patient.id}`;
  const [entries,setEntries]=useState(()=>store.get(key)||[]);
  const [wInput,setWInput]=useState("");
  const [syncing,setSyncing]=useState(false);
  useEffect(()=>{
    db.load(patient.id,"peso").then(rows=>{
      if(rows&&rows.length>0){
        const data=rows.map(r=>r.valor).sort((a,b)=>a.date.localeCompare(b.date));
        setEntries(data);store.set(key,data);
      }
    });
  },[]);
  async function add(){
    const v=parseFloat(wInput.replace(",","."));
    if(isNaN(v)||v<30||v>300)return;
    const entry={date:todayStr(),weight:v};
    const n=[...entries.filter(e=>e.date!==todayStr()),entry].sort((a,b)=>a.date.localeCompare(b.date));
    setEntries(n);store.set(key,n);setWInput("");
    setSyncing(true);
    await db.save(patient.id,"peso",todayStr(),entry);
    setSyncing(false);
  }
  function remove(i){const n=entries.filter((_,idx)=>idx!==i);setEntries(n);store.set(key,n);}
  const last=entries[entries.length-1];const first=entries[0];
  const diff=entries.length>1?(last.weight-first.weight).toFixed(1):null;
  return(
    <div style={{padding:"0 14px 80px"}}>
      {syncing&&<p style={{textAlign:"center",color:T.muted,fontSize:11,fontFamily:"monospace",marginBottom:8}}>Salvando na nuvem...</p>}
      {entries.length>0&&<div style={{display:"flex",gap:10,marginBottom:14}}>{[{label:"Atual",value:`${last.weight} kg`},{label:"Inicial",value:`${first.weight} kg`},{label:"Variacao",value:diff?`${diff>0?"+":""}${diff} kg`:"—",color:Number(diff)<0?T.success:T.danger}].map((s,i)=><div key={i} style={{flex:1,background:T.bgMid,borderRadius:10,padding:"10px 12px",border:`1px solid ${T.border}`}}><p style={{margin:0,fontSize:10,color:T.muted,fontFamily:"monospace",textTransform:"uppercase"}}>{s.label}</p><p style={{margin:"3px 0 0",color:s.color||T.text,fontSize:14,fontWeight:700}}>{s.value}</p></div>)}</div>}
      <Card T={T} style={{marginBottom:14,padding:"14px 16px"}}>
        <Label T={T}>Registrar peso</Label>
        <div style={{display:"flex",gap:8,margin:"8px 0"}}>
          <Input value={wInput} onChange={e=>setWInput(e.target.value)} placeholder="Ex: 68.5" type="number" T={T} style={{flex:1}} onKeyDown={e=>e.key==="Enter"&&add()}/>
          <span style={{display:"flex",alignItems:"center",color:T.muted,fontSize:14,fontFamily:"monospace"}}>kg</span>
        </div>
        <Btn onClick={add} T={T} style={{width:"100%"}}>+ Registrar</Btn>
      </Card>
      {[...entries].reverse().map((e,i)=>(
        <div key={i} style={{display:"flex",justifyContent:"space-between",alignItems:"center",background:T.bgMid,borderRadius:10,padding:"10px 14px",marginBottom:8,border:`1px solid ${T.border}`}}>
          <div><p style={{margin:0,fontSize:11,color:T.muted,fontFamily:"monospace"}}>{e.date}</p><p style={{margin:"2px 0 0",fontSize:16,color:T.text,fontWeight:700,fontFamily:"monospace"}}>{e.weight} kg</p></div>
          <button onClick={()=>remove(entries.length-1-i)} style={{background:"none",border:"none",color:T.muted,cursor:"pointer",fontSize:16}}>X</button>
        </div>
      ))}
    </div>
  );
}

function FotosSection({patient,T,isNutri=false}){
  const key=`fotos_${patient.id}`;
  const [fotos,setFotos]=useState(()=>store.get(key)||[]);
  const [compareA,setCompareA]=useState(null);
  const [compareB,setCompareB]=useState(null);
  const [comparing,setComparing]=useState(false);
  const [addingPhoto,setAddingPhoto]=useState(false);
  const [newPhoto,setNewPhoto]=useState(null);
  const [newLabel,setNewLabel]=useState("");
  const [newDate,setNewDate]=useState(todayStr());
  const [newObs,setNewObs]=useState("");
  const fileRef=useRef();

  useEffect(()=>{
    db.load(patient.id,"fotos").then(rows=>{
      if(rows&&rows.length>0){
        const data=rows.map(r=>r.valor).sort((a,b)=>a.date.localeCompare(b.date));
        setFotos(data);store.set(key,data);
      }
    });
  },[]);

  function handleFile(ev){
    const file=ev.target.files[0];if(!file)return;
    const reader=new FileReader();
    reader.onload=r=>setNewPhoto(r.target.result);
    reader.readAsDataURL(file);
  }

  function savePhoto(){
    if(!newPhoto)return;
    const entry={id:Date.now().toString(),date:newDate,label:newLabel||newDate,obs:newObs,photo:newPhoto,addedBy:isNutri?"nutri":"patient"};
    const n=[...fotos,entry].sort((a,b)=>a.date.localeCompare(b.date));
    setFotos(n);store.set(key,n);
    db.save(patient.id,"fotos",newDate,entry);
    setNewPhoto(null);setNewLabel("");setNewDate(todayStr());setNewObs("");setAddingPhoto(false);
  }

  function removePhoto(id){
    const n=fotos.filter(f=>f.id!==id);setFotos(n);store.set(key,n);
    if(compareA===id)setCompareA(null);
    if(compareB===id)setCompareB(null);
  }

  const fotoA=fotos.find(f=>f.id===compareA);
  const fotoB=fotos.find(f=>f.id===compareB);

  if(comparing&&fotoA&&fotoB)return(
    <div>
      <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:14}}>
        <button onClick={()=>setComparing(false)} style={{background:"none",border:"none",color:T.gold,cursor:"pointer",fontSize:20,lineHeight:1}}>←</button>
        <p style={{margin:0,fontSize:13,color:T.text,fontWeight:700}}>Comparação de fotos</p>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:10}}>
        {[fotoA,fotoB].map((f,i)=>(
          <div key={i}>
            <img src={f.photo} alt={f.label} style={{width:"100%",aspectRatio:"3/4",objectFit:"cover",borderRadius:10,border:`2px solid ${i===0?T.info:T.success}`}}/>
            <p style={{margin:"6px 0 0",fontSize:10,fontFamily:"monospace",color:i===0?T.info:T.success,textAlign:"center"}}>{f.label}</p>
            {f.obs&&<p style={{margin:"2px 0 0",fontSize:10,color:T.muted,textAlign:"center",fontStyle:"italic"}}>{f.obs}</p>}
          </div>
        ))}
      </div>
      <div style={{background:T.bgLight,borderRadius:10,padding:"10px 14px",textAlign:"center"}}>
        <p style={{margin:0,fontSize:11,color:T.muted,fontFamily:"monospace"}}>
          {fotoA.label} → {fotoB.label}
        </p>
      </div>
    </div>
  );

  if(addingPhoto)return(
    <div>
      <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:16}}>
        <button onClick={()=>{setAddingPhoto(false);setNewPhoto(null);}} style={{background:"none",border:"none",color:T.gold,cursor:"pointer",fontSize:20,lineHeight:1}}>←</button>
        <p style={{margin:0,fontSize:14,color:T.text,fontWeight:700}}>{isNutri?"Adicionar foto da consulta":"Adicionar foto"}</p>
      </div>
      <div style={{marginBottom:12}}>
        <Label T={T}>Data</Label>
        <input type="date" value={newDate} onChange={e=>setNewDate(e.target.value)} style={{background:T.bgLight,border:`1px solid ${T.border}`,borderRadius:10,padding:"11px 14px",color:T.text,fontSize:14,outline:"none",width:"100%"}}/>
      </div>
      <div style={{marginBottom:12}}>
        <Label T={T}>Legenda (opcional)</Label>
        <input value={newLabel} onChange={e=>setNewLabel(e.target.value)} placeholder={`Ex: Semana 4 · ${isNutri?"Consulta":"Frente"}`} style={{background:T.bgLight,border:`1px solid ${T.border}`,borderRadius:10,padding:"11px 14px",color:T.text,fontSize:14,outline:"none",width:"100%"}}/>
      </div>
      <div style={{marginBottom:12}}>
        {newPhoto?(
          <div style={{position:"relative"}}>
            <img src={newPhoto} alt="preview" style={{width:"100%",maxHeight:260,objectFit:"cover",borderRadius:10,border:`1px solid ${T.border}`}}/>
            <button onClick={()=>setNewPhoto(null)} style={{position:"absolute",top:8,right:8,background:"rgba(0,0,0,0.6)",border:"none",borderRadius:"50%",width:28,height:28,color:"#fff",cursor:"pointer",fontSize:16}}>×</button>
          </div>
        ):(
          <button onClick={()=>fileRef.current.click()} style={{width:"100%",padding:"40px 14px",background:T.bgLight,border:`2px dashed ${T.border}`,borderRadius:10,color:T.muted,cursor:"pointer",fontSize:13,fontFamily:"Georgia,serif",display:"flex",flexDirection:"column",alignItems:"center",gap:8}}>
            <span style={{fontSize:32}}>📷</span>
            <span>{isNutri?"Carregar foto da consulta":"Tirar foto / escolher da galeria"}</span>
          </button>
        )}
        <input ref={fileRef} type="file" accept="image/*" capture={isNutri?undefined:"environment"} onChange={handleFile} style={{display:"none"}}/>
      </div>
      <div style={{marginBottom:16}}>
        <Label T={T}>Observação (opcional)</Label>
        <input value={newObs} onChange={e=>setNewObs(e.target.value)} placeholder="Ex: Início do protocolo, pós-consulta..." style={{background:T.bgLight,border:`1px solid ${T.border}`,borderRadius:10,padding:"11px 14px",color:T.text,fontSize:14,outline:"none",width:"100%"}}/>
      </div>
      <Btn onClick={savePhoto} T={T} style={{width:"100%",padding:"13px",fontSize:14}} disabled={!newPhoto}>Salvar foto</Btn>
    </div>
  );

  return(
    <div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
        <p style={{margin:0,fontSize:10,color:T.gold,fontFamily:"monospace",letterSpacing:2,textTransform:"uppercase"}}>Evolução fotográfica</p>
        <div style={{display:"flex",gap:8}}>
          {fotos.length>=2&&(
            <button onClick={()=>{setCompareA(fotos[0].id);setCompareB(fotos[fotos.length-1].id);setComparing(true);}} style={{padding:"5px 10px",background:"transparent",border:`1px solid ${T.info}`,borderRadius:8,color:T.info,cursor:"pointer",fontSize:11,fontFamily:"monospace"}}>Comparar</button>
          )}
          <button onClick={()=>setAddingPhoto(true)} style={{padding:"5px 10px",background:T.gold,border:"none",borderRadius:8,color:"#0D1B2A",cursor:"pointer",fontSize:11,fontFamily:"monospace",fontWeight:700}}>+ Foto</button>
        </div>
      </div>

      {fotos.length===0?(
        <div style={{textAlign:"center",padding:"30px 0",background:T.bgLight,borderRadius:12,border:`1px dashed ${T.border}`}}>
          <p style={{fontSize:32,marginBottom:8}}>📸</p>
          <p style={{color:T.muted,fontSize:12,fontFamily:"monospace"}}>Nenhuma foto ainda.</p>
          <p style={{color:T.muted,fontSize:11,fontFamily:"monospace",marginTop:4}}>Adicione a primeira foto para começar a evolução.</p>
        </div>
      ):(
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8}}>
          {fotos.map(f=>(
            <div key={f.id} style={{position:"relative",borderRadius:10,overflow:"hidden",border:`1px solid ${T.border}`,cursor:"pointer"}}
              onClick={()=>{
                if(!compareA){setCompareA(f.id);}
                else if(!compareB&&f.id!==compareA){setCompareB(f.id);setComparing(true);}
                else{setCompareA(f.id);setCompareB(null);}
              }}>
              <img src={f.photo} alt={f.label} style={{width:"100%",aspectRatio:"3/4",objectFit:"cover",display:"block"}}/>
              {(compareA===f.id||compareB===f.id)&&(
                <div style={{position:"absolute",top:4,right:4,background:compareA===f.id?T.info:T.success,borderRadius:"50%",width:20,height:20,display:"flex",alignItems:"center",justifyContent:"center",fontSize:10,color:"#fff",fontWeight:700}}>{compareA===f.id?"A":"B"}</div>
              )}
              {f.addedBy==="nutri"&&(
                <div style={{position:"absolute",top:4,left:4,background:"rgba(0,0,0,0.55)",borderRadius:4,padding:"2px 5px",fontSize:8,color:"#fff",fontFamily:"monospace"}}>DR</div>
              )}
              <div style={{background:"rgba(0,0,0,0.5)",padding:"5px 6px"}}>
                <p style={{margin:0,fontSize:9,color:"#fff",fontFamily:"monospace",textAlign:"center"}}>{f.label||f.date}</p>
              </div>
              {(isNutri||f.addedBy==="patient")&&(
                <button onClick={e=>{e.stopPropagation();removePhoto(f.id);}} style={{position:"absolute",bottom:22,right:4,background:"rgba(0,0,0,0.55)",border:"none",borderRadius:4,color:"#fff",cursor:"pointer",fontSize:10,padding:"2px 5px"}}>×</button>
              )}
            </div>
          ))}
        </div>
      )}
      {fotos.length>0&&fotos.length<2&&(
        <p style={{marginTop:8,fontSize:10,color:T.muted,fontFamily:"monospace",textAlign:"center"}}>Adicione mais uma foto para comparar lado a lado.</p>
      )}
      {fotos.length>=2&&!compareA&&(
        <p style={{marginTop:8,fontSize:10,color:T.muted,fontFamily:"monospace",textAlign:"center"}}>Toque em duas fotos para comparar · ou use o botão "Comparar"</p>
      )}
      {compareA&&!compareB&&(
        <p style={{marginTop:8,fontSize:10,color:T.info,fontFamily:"monospace",textAlign:"center"}}>Foto A selecionada · toque em outra para comparar</p>
      )}
    </div>
  );
}

  {id:"rcq",label:"RCQ",unit:"",color:"#CC6A8F",positivo:false},
  {id:"imc",label:"IMC",unit:"",color:"#7AB0CC",positivo:false},
  {id:"somatorio",label:"Σ Dobras",unit:"mm",color:"#A0A0A0",positivo:false},
  {id:"bracoContraido",label:"Braço Contr.",unit:"cm",color:"#4CAF7D",positivo:true},
  {id:"panturrilha",label:"Panturrilha",unit:"cm",color:"#4CAF7D",positivo:true},
];

function AvaliacaoChart({dados,metric,T}){
  const cur=AVAL_METRICAS.find(m=>m.id===metric)||AVAL_METRICAS[0];
  const validDados=dados.filter(d=>d[metric]!=null);
  if(validDados.length===0)return null;
  const vals=validDados.map(d=>d[metric]);
  const minV=Math.min(...vals);const maxV=Math.max(...vals);
  const range=maxV-minV||1;
  const W=300,H=110,pad=22;
  const pts=validDados.map((d,i)=>({
    x:pad+(i/(Math.max(validDados.length-1,1)))*(W-pad*2),
    y:pad+((maxV-d[metric])/range)*(H-pad*2),
    d
  }));
  const polyline=pts.map(p=>`${p.x.toFixed(1)},${p.y.toFixed(1)}`).join(" ");
  const first=validDados[0];const last=validDados[validDados.length-1];
  const diff=(last[metric]-first[metric]);
  const isPositive=cur.positivo?diff>0:diff<0;
  const diffStr=(diff>0?"+":"")+diff.toFixed(diff%1===0?0:1);
  return(
    <div style={{background:T.bgMid,border:`1px solid ${T.border}`,borderRadius:14,padding:"14px 16px",marginBottom:12}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:10}}>
        <div>
          <p style={{margin:0,fontSize:10,color:T.muted,fontFamily:"monospace"}}>{cur.label} atual</p>
          <p style={{margin:"2px 0",fontSize:26,color:cur.color,fontWeight:700,fontFamily:"monospace"}}>{last[metric]}<span style={{fontSize:13,color:T.muted}}>{cur.unit?" "+cur.unit:""}</span></p>
        </div>
        <div style={{textAlign:"right"}}>
          <p style={{margin:0,fontSize:10,color:T.muted,fontFamily:"monospace"}}>Variação total</p>
          <p style={{margin:"2px 0",fontSize:16,fontWeight:700,fontFamily:"monospace",color:validDados.length>1?(isPositive?T.success:T.danger):T.muted}}>{validDados.length>1?diffStr+"  "+cur.unit:"—"}</p>
        </div>
      </div>
      {validDados.length>1&&(
        <svg viewBox={`0 0 ${W} ${H}`} style={{width:"100%",height:"auto"}}>
          <polyline points={polyline} fill="none" stroke={cur.color} strokeWidth="2.5" strokeLinejoin="round"/>
          {pts.map((p,i)=>(
            <g key={i}>
              <circle cx={p.x} cy={p.y} r="4.5" fill={cur.color}/>
              <text x={p.x} y={H} textAnchor="middle" fontSize="7" fill={T.muted} fontFamily="monospace">{p.d.data.slice(0,5)}</text>
              <text x={p.x} y={p.y-7} textAnchor="middle" fontSize="7.5" fill={cur.color} fontFamily="monospace">{p.d[metric]}</text>
            </g>
          ))}
        </svg>
      )}
    </div>
  );
}

      {/* Header */}
      <div style={{background:T.bgMid,border:`1px solid ${T.border}`,borderRadius:14,padding:"14px 16px",marginBottom:14}}>
        <p style={{margin:"0 0 3px",fontSize:10,color:T.gold,fontFamily:"monospace",letterSpacing:2,textTransform:"uppercase"}}>Avaliação Física</p>
        <h2 style={{margin:"0 0 2px",color:T.text,fontSize:17}}>{patient.name}</h2>
        <p style={{margin:0,fontSize:11,color:T.muted,fontFamily:"monospace"}}>{altura} · {dados.length} {dados.length===1?"avaliação":"avaliações"}</p>
      </div>

      {/* Resumo composição */}
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,marginBottom:14}}>
        {[
          {label:"Peso",v1:`${first.peso} kg`,v2:`${last.peso} kg`,diff:last.peso-first.peso,positivo:false},
          {label:"% Gordura",v1:`${first.gordura}%`,v2:`${last.gordura}%`,diff:last.gordura-first.gordura,positivo:false},
          {label:"M. Magra",v1:`${first.massaMagra} kg`,v2:`${last.massaMagra} kg`,diff:last.massaMagra-first.massaMagra,positivo:true},
        ].map((s,i)=>{
          const isGood=s.positivo?s.diff>0:s.diff<0;
          const showDiff=dados.length>1;
          return(
            <div key={i} style={{background:T.bgMid,border:`1px solid ${T.border}`,borderRadius:10,padding:"10px 10px"}}>
              <p style={{margin:0,fontSize:9,color:T.muted,fontFamily:"monospace",textTransform:"uppercase"}}>{s.label}</p>
              <p style={{margin:"3px 0 1px",color:T.text,fontSize:14,fontWeight:700,fontFamily:"monospace"}}>{s.v2}</p>
              {showDiff&&<p style={{margin:0,fontSize:10,fontFamily:"monospace",color:isGood?T.success:T.danger}}>{s.diff>0?"+":""}{s.diff.toFixed(1)}</p>}
            </div>
          );
        })}
      </div>

      {/* Seção tabs */}
      <div style={{display:"flex",gap:6,marginBottom:14,overflowX:"auto"}}>
        {secoes.map(s=>(
          <button key={s.id} onClick={()=>{setSecao(s.id);if(s.id!=="fotos")setMetric(metricasPorSecao[s.id]?.[0]||"peso");}} style={{flexShrink:0,padding:"6px 14px",borderRadius:20,fontSize:11,fontFamily:"monospace",cursor:"pointer",border:`1px solid ${secao===s.id?T.gold:T.border}`,background:secao===s.id?T.gold:"transparent",color:secao===s.id?"#0D1B2A":T.muted,fontWeight:secao===s.id?700:400}}>{s.label}</button>
        ))}
      </div>

      {secao==="fotos"?(
        <FotosSection patient={patient} T={T} isNutri={false}/>
      ):(
        <>
          {/* Metric selector */}
          <div style={{display:"flex",gap:6,marginBottom:12,overflowX:"auto",paddingBottom:2}}>
            {metricasAtivas.map(mid=>{
              const m=AVAL_METRICAS.find(x=>x.id===mid)||{id:mid,label:mid.replace("dobra","").replace(/([A-Z])/g," $1").trim(),color:"#888",unit:"mm",positivo:false};
              const hasData=dados.some(d=>d[mid]!=null);
              if(!hasData)return null;
              return(
                <button key={mid} onClick={()=>setMetric(mid)} style={{flexShrink:0,padding:"5px 12px",borderRadius:20,fontSize:10,fontFamily:"monospace",cursor:"pointer",border:`1px solid ${metric===mid?m.color:T.border}`,background:metric===mid?m.color+"22":"transparent",color:metric===mid?m.color:T.muted,fontWeight:metric===mid?700:400}}>{m.label||mid}</button>
              );
            })}
          </div>

          <AvaliacaoChart dados={dados} metric={metric} T={T}/>

          {/* Tabela comparativa */}
          {dados.length>1&&(
            <div style={{background:T.bgMid,border:`1px solid ${T.border}`,borderRadius:12,overflow:"hidden",marginBottom:14}}>
              <div style={{overflowX:"auto"}}>
                <table style={{width:"100%",borderCollapse:"collapse",fontSize:11,fontFamily:"monospace"}}>
                  <thead>
                    <tr style={{background:T.bgLight}}>
                      <td style={{padding:"8px 10px",color:T.muted,fontWeight:700}}>Parâmetro</td>
                      {dados.map((d,i)=><td key={i} style={{padding:"8px 10px",color:T.gold,textAlign:"center",whiteSpace:"nowrap"}}>{d.data.slice(0,5)}</td>)}
                    </tr>
                  </thead>
                  <tbody>
                    {metricasAtivas.filter(mid=>dados.some(d=>d[mid]!=null)).map(mid=>{
                      const m=AVAL_METRICAS.find(x=>x.id===mid)||{label:mid,unit:"mm",positivo:false};
                      const vals=dados.map(d=>d[mid]);
                      const first=vals.find(v=>v!=null);
                      return(
                        <tr key={mid} style={{borderTop:`1px solid ${T.border}`}}>
                          <td style={{padding:"7px 10px",color:T.muted}}>{m.label||mid}</td>
                          {vals.map((v,i)=>{
                            if(v==null)return<td key={i} style={{padding:"7px 10px",textAlign:"center",color:T.muted}}>—</td>;
                            const prev=vals.slice(0,i).filter(x=>x!=null).pop();
                            const diff=prev!=null?v-prev:null;
                            const isGood=diff==null?null:(m.positivo?diff>0:diff<0);
                            return(
                              <td key={i} style={{padding:"7px 10px",textAlign:"center",color:T.text,fontWeight:i===vals.length-1?700:400}}>
                                {v}
                                {diff!=null&&diff!==0&&<span style={{fontSize:9,color:isGood?T.success:T.danger,marginLeft:2}}>{diff>0?"+":""}{diff.toFixed(diff%1===0?0:1)}</span>}
                              </td>
                            );
                          })}
                        </tr>
                      );
                    })}
                  </tbody>
                </table>
              </div>
            </div>
          )}

          {/* Única avaliação — card completo */}
          {dados.length===1&&(
            <div style={{background:T.bgMid,border:`1px solid ${T.border}`,borderRadius:12,padding:"14px 16px",marginBottom:14}}>
              <p style={{margin:"0 0 10px",fontSize:10,color:T.gold,fontFamily:"monospace",letterSpacing:2,textTransform:"uppercase"}}>Avaliação de {dados[0].data}</p>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
                {metricasAtivas.filter(mid=>dados[0][mid]!=null).map(mid=>{
                  const m=AVAL_METRICAS.find(x=>x.id===mid)||{label:mid,unit:"mm"};
                  return(
                    <div key={mid} style={{background:T.bgLight,borderRadius:8,padding:"8px 10px"}}>
                      <p style={{margin:0,fontSize:9,color:T.muted,fontFamily:"monospace",textTransform:"uppercase"}}>{m.label||mid}</p>
                      <p style={{margin:"2px 0 0",fontSize:14,color:T.text,fontWeight:700,fontFamily:"monospace"}}>{dados[0][mid]}{m.unit?" "+m.unit:""}</p>
                    </div>
                  );
                })}
              </div>
            </div>
          )}
        </>
      )}
    </div>
  );
}

function SupsTab({patient,T}){
  const key=`sups_${patient.id}_${todayStr()}`;
  const [taken,setTaken]=useState(()=>store.get(key)||{});
  function toggle(id){const n={...taken,[id]:!taken[id]};setTaken(n);store.set(key,n);}
  return(
    <div style={{padding:"0 14px 80px"}}>
      {patient.supplements.map((s,i)=>s.times.map((t,j)=>{
        const id=`${i}_${j}`;const done=taken[id];
        return <div key={id} onClick={()=>toggle(id)} style={{display:"flex",alignItems:"center",gap:12,background:done?`${T.success}18`:T.bgMid,border:`1px solid ${done?T.success:T.border}`,borderRadius:12,padding:"12px 14px",cursor:"pointer",marginBottom:10,transition:"all .2s"}}>
          <div style={{width:22,height:22,borderRadius:"50%",flexShrink:0,border:`2px solid ${done?T.success:T.border}`,background:done?T.success:"transparent",display:"flex",alignItems:"center",justifyContent:"center",fontSize:12,color:"#fff"}}>{done?"v":""}</div>
          <div style={{flex:1}}><p style={{margin:0,fontSize:10,color:T.gold,fontFamily:"monospace",textTransform:"uppercase"}}>{t}</p><p style={{margin:"2px 0 0",fontSize:14,color:done?T.muted:T.text,fontWeight:700,textDecoration:done?"line-through":"none"}}>{s.name}</p><p style={{margin:"1px 0 0",fontSize:12,color:T.muted}}>{s.dose}</p></div>
        </div>;
      }))}
    </div>
  );
}

// ─── DIÁRIO ALIMENTAR ────────────────────────────────────────────────────────

function DiarioTab({patient,T}){
  const key=`diario_${patient.id}`;
  const [entries,setEntries]=useState(()=>store.get(key)||[]);
  const [showForm,setShowForm]=useState(false);
  const [editId,setEditId]=useState(null);
  const [selectedDate,setSelectedDate]=useState(todayStr());

  // form state
  const [fMeal,setFMeal]=useState("");
  const [fCustomMeal,setFCustomMeal]=useState("");
  const [fTime,setFTime]=useState(()=>new Date().toTimeString().slice(0,5));
  const [fDesc,setFDesc]=useState("");
  const [fHunger,setFHunger]=useState(2);
  const [fSatiety,setFSatiety]=useState(2);
  const [fMood,setFMood]=useState("neutro");
  const [fPhoto,setFPhoto]=useState(null);
  const [fObs,setFObs]=useState("");
  const fileRef=useRef();

  const mealNames=patient.plan.map(m=>m.meal);

  function resetForm(){
    setFMeal("");setFCustomMeal("");setFTime(new Date().toTimeString().slice(0,5));
    setFDesc("");setFHunger(2);setFSatiety(2);setFMood("neutro");setFPhoto(null);setFObs("");
    setEditId(null);
  }

  function openNew(){resetForm();setShowForm(true);}

  function openEdit(e){
    setFMeal(e.meal);setFCustomMeal(e.customMeal||"");setFTime(e.time);
    setFDesc(e.desc);setFHunger(e.hunger);setFSatiety(e.satiety);setFMood(e.mood);
    setFPhoto(e.photo||null);setFObs(e.obs||"");setEditId(e.id);setShowForm(true);
  }

  function handlePhoto(ev){
    const file=ev.target.files[0];
    if(!file)return;
    const reader=new FileReader();
    reader.onload=r=>setFPhoto(r.target.result);
    reader.readAsDataURL(file);
  }

  function save(){
    if(!fDesc.trim()&&!fPhoto)return;
    const entry={
      id:editId||Date.now().toString(),
      date:selectedDate,
      meal:fMeal,
      customMeal:fCustomMeal,
      time:fTime,
      desc:fDesc,
      hunger:fHunger,
      satiety:fSatiety,
      mood:fMood,
      photo:fPhoto,
      obs:fObs,
      createdAt:new Date().toISOString()
    };
    let n;
    if(editId){n=entries.map(e=>e.id===editId?entry:e);}
    else{n=[entry,...entries];}
    setEntries(n);store.set(key,n);
    db.save(patient.id,"diario",selectedDate,entry);
    setShowForm(false);resetForm();
  }

  function remove(id){
    const n=entries.filter(e=>e.id!==id);
    setEntries(n);store.set(key,n);
  }

  const dayEntries=entries.filter(e=>e.date===selectedDate).sort((a,b)=>a.time.localeCompare(b.time));

  // unique dates for date selector
  const allDates=[...new Set(entries.map(e=>e.date))].sort((a,b)=>b.localeCompare(a));
  if(!allDates.includes(todayStr()))allDates.unshift(todayStr());

  const moodObj=MOOD_OPTIONS.find(m=>m.v===fMood)||MOOD_OPTIONS[2];

  if(showForm)return(
    <div style={{padding:"0 14px 80px",animation:"fadeIn .2s ease"}}>
      <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:18}}>
        <button onClick={()=>{setShowForm(false);resetForm();}} style={{background:"none",border:"none",color:T.gold,cursor:"pointer",fontSize:22,lineHeight:1}}>←</button>
        <h2 style={{color:T.text,fontSize:17,fontWeight:700,margin:0}}>{editId?"Editar registro":"Novo registro"}</h2>
      </div>

      {/* Refeição */}
      <div style={{marginBottom:14}}>
        <Label T={T}>Refeição</Label>
        <div style={{display:"flex",flexWrap:"wrap",gap:6,marginBottom:8}}>
          {mealNames.map(m=>(
            <button key={m} onClick={()=>setFMeal(m===fMeal?"":m)} style={{padding:"5px 12px",borderRadius:20,fontSize:11,fontFamily:"monospace",cursor:"pointer",border:`1px solid ${fMeal===m?T.gold:T.border}`,background:fMeal===m?T.gold:"transparent",color:fMeal===m?"#0D1B2A":T.muted,whiteSpace:"nowrap"}}>{m}</button>
          ))}
          <button onClick={()=>setFMeal(fMeal==="outro"?"":"outro")} style={{padding:"5px 12px",borderRadius:20,fontSize:11,fontFamily:"monospace",cursor:"pointer",border:`1px solid ${fMeal==="outro"?T.gold:T.border}`,background:fMeal==="outro"?T.gold:"transparent",color:fMeal==="outro"?"#0D1B2A":T.muted}}>Outro</button>
        </div>
        {fMeal==="outro"&&<Input value={fCustomMeal} onChange={e=>setFCustomMeal(e.target.value)} placeholder="Nome da refeição" T={T}/>}
      </div>

      {/* Horário */}
      <div style={{marginBottom:14}}>
        <Label T={T}>Horário</Label>
        <Input value={fTime} onChange={e=>setFTime(e.target.value)} type="time" T={T}/>
      </div>

      {/* O que comeu */}
      <div style={{marginBottom:14}}>
        <Label T={T}>O que você comeu</Label>
        <textarea value={fDesc} onChange={e=>setFDesc(e.target.value)} placeholder="Ex: Arroz integral 150g, frango grelhado 120g, salada de folhas..." style={{background:T.bgLight,border:`1px solid ${T.border}`,borderRadius:10,padding:"11px 14px",color:T.text,fontSize:14,outline:"none",width:"100%",minHeight:90,resize:"vertical",fontFamily:"Georgia, serif",lineHeight:1.5}} onFocus={e=>e.target.style.borderColor=T.gold} onBlur={e=>e.target.style.borderColor=T.border}/>
      </div>

      {/* Foto */}
      <div style={{marginBottom:14}}>
        <Label T={T}>Foto do prato (opcional)</Label>
        {fPhoto?(
          <div style={{position:"relative",display:"inline-block"}}>
            <img src={fPhoto} alt="prato" style={{width:"100%",maxHeight:200,objectFit:"cover",borderRadius:10,border:`1px solid ${T.border}`}}/>
            <button onClick={()=>setFPhoto(null)} style={{position:"absolute",top:6,right:6,background:"rgba(0,0,0,0.6)",border:"none",borderRadius:"50%",width:26,height:26,color:"#fff",cursor:"pointer",fontSize:14,display:"flex",alignItems:"center",justifyContent:"center"}}>×</button>
          </div>
        ):(
          <button onClick={()=>fileRef.current.click()} style={{width:"100%",padding:"14px",background:T.bgLight,border:`1px dashed ${T.border}`,borderRadius:10,color:T.muted,cursor:"pointer",fontSize:13,fontFamily:"Georgia,serif"}}>📷 Tirar foto / escolher da galeria</button>
        )}
        <input ref={fileRef} type="file" accept="image/*" capture="environment" onChange={handlePhoto} style={{display:"none"}}/>
      </div>

      {/* Fome antes */}
      <div style={{marginBottom:14}}>
        <Label T={T}>Fome antes de comer</Label>
        <div style={{display:"flex",gap:6}}>
          {HUNGER_LABELS.map((l,i)=>(
            <button key={i} onClick={()=>setFHunger(i)} style={{flex:1,padding:"7px 2px",borderRadius:8,fontSize:10,fontFamily:"monospace",cursor:"pointer",border:`1px solid ${fHunger===i?T.gold:T.border}`,background:fHunger===i?T.gold:"transparent",color:fHunger===i?"#0D1B2A":T.muted,textAlign:"center",lineHeight:1.3}}>{i+1}</button>
          ))}
        </div>
        <p style={{margin:"4px 0 0",fontSize:11,color:T.muted,fontFamily:"monospace",textAlign:"center"}}>{HUNGER_LABELS[fHunger]}</p>
      </div>

      {/* Saciedade depois */}
      <div style={{marginBottom:14}}>
        <Label T={T}>Saciedade após comer</Label>
        <div style={{display:"flex",gap:6}}>
          {SATIETY_LABELS.map((l,i)=>(
            <button key={i} onClick={()=>setFSatiety(i)} style={{flex:1,padding:"7px 2px",borderRadius:8,fontSize:10,fontFamily:"monospace",cursor:"pointer",border:`1px solid ${fSatiety===i?T.gold:T.border}`,background:fSatiety===i?T.gold:"transparent",color:fSatiety===i?"#0D1B2A":T.muted,textAlign:"center"}}>{i+1}</button>
          ))}
        </div>
        <p style={{margin:"4px 0 0",fontSize:11,color:T.muted,fontFamily:"monospace",textAlign:"center"}}>{SATIETY_LABELS[fSatiety]}</p>
      </div>

      {/* Humor */}
      <div style={{marginBottom:14}}>
        <Label T={T}>Como você está?</Label>
        <div style={{display:"flex",gap:8}}>
          {MOOD_OPTIONS.map(m=>(
            <button key={m.v} onClick={()=>setFMood(m.v)} style={{flex:1,padding:"8px 4px",borderRadius:10,border:`1px solid ${fMood===m.v?T.gold:T.border}`,background:fMood===m.v?`${T.gold}22`:"transparent",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:2}}>
              <span style={{fontSize:20}}>{m.e}</span>
              <span style={{fontSize:9,fontFamily:"monospace",color:fMood===m.v?T.gold:T.muted}}>{m.label}</span>
            </button>
          ))}
        </div>
      </div>

      {/* Observação */}
      <div style={{marginBottom:20}}>
        <Label T={T}>Observação (opcional)</Label>
        <Input value={fObs} onChange={e=>setFObs(e.target.value)} placeholder="Como foi a refeição? Algum desconforto?" T={T}/>
      </div>

      <Btn onClick={save} T={T} style={{width:"100%",padding:"14px",fontSize:15}} disabled={!fDesc.trim()&&!fPhoto}>
        {editId?"Salvar alterações":"Registrar refeição"}
      </Btn>
    </div>
  );

  return(
    <div style={{padding:"0 14px 80px"}}>
      {/* Date selector */}
      <div style={{display:"flex",gap:6,overflowX:"auto",marginBottom:14,paddingBottom:4}}>
        {allDates.slice(0,10).map(d=>{
          const isToday=d===todayStr();
          const label=isToday?"Hoje":d.slice(5).split("-").reverse().join("/");
          const count=entries.filter(e=>e.date===d).length;
          return(
            <button key={d} onClick={()=>setSelectedDate(d)} style={{flexShrink:0,padding:"6px 12px",borderRadius:20,fontSize:11,fontFamily:"monospace",cursor:"pointer",border:`1px solid ${selectedDate===d?T.gold:T.border}`,background:selectedDate===d?T.gold:"transparent",color:selectedDate===d?"#0D1B2A":T.muted,whiteSpace:"nowrap"}}>
              {label}{count>0&&<span style={{marginLeft:4,fontSize:9}}>({count})</span>}
            </button>
          );
        })}
      </div>

      {/* Summary for day */}
      {dayEntries.length>0&&(
        <div style={{display:"flex",gap:8,marginBottom:14}}>
          <div style={{flex:1,background:T.bgMid,border:`1px solid ${T.border}`,borderRadius:10,padding:"10px 12px",textAlign:"center"}}>
            <p style={{margin:0,fontSize:20,color:T.gold,fontWeight:700,fontFamily:"monospace"}}>{dayEntries.length}</p>
            <p style={{margin:"2px 0 0",fontSize:9,color:T.muted,fontFamily:"monospace",textTransform:"uppercase"}}>Refeições</p>
          </div>
          <div style={{flex:1,background:T.bgMid,border:`1px solid ${T.border}`,borderRadius:10,padding:"10px 12px",textAlign:"center"}}>
            <p style={{margin:0,fontSize:20,fontFamily:"monospace",fontWeight:700,color:T.text}}>
              {MOOD_OPTIONS.find(m=>m.v===dayEntries[Math.floor(dayEntries.length/2)]?.mood)?.e||"—"}
            </p>
            <p style={{margin:"2px 0 0",fontSize:9,color:T.muted,fontFamily:"monospace",textTransform:"uppercase"}}>Humor geral</p>
          </div>
          <div style={{flex:1,background:T.bgMid,border:`1px solid ${T.border}`,borderRadius:10,padding:"10px 12px",textAlign:"center"}}>
            <p style={{margin:0,fontSize:20,color:T.info,fontWeight:700,fontFamily:"monospace"}}>
              {dayEntries.filter(e=>e.photo).length}
            </p>
            <p style={{margin:"2px 0 0",fontSize:9,color:T.muted,fontFamily:"monospace",textTransform:"uppercase"}}>Com foto</p>
          </div>
        </div>
      )}

      {/* Add button */}
      <button onClick={openNew} style={{width:"100%",padding:"13px",background:"transparent",border:`1px dashed ${T.gold}`,borderRadius:12,color:T.gold,fontSize:14,fontWeight:700,cursor:"pointer",marginBottom:14,fontFamily:"Georgia,serif"}}>
        + Registrar refeição
      </button>

      {/* Entries */}
      {dayEntries.length===0?(
        <div style={{textAlign:"center",padding:"40px 0"}}>
          <p style={{fontSize:36,marginBottom:10}}>🍽️</p>
          <p style={{color:T.muted,fontSize:13,fontFamily:"monospace"}}>Nenhum registro para este dia.</p>
          <p style={{color:T.muted,fontSize:11,fontFamily:"monospace",marginTop:4}}>Toque em "+ Registrar refeição" para começar.</p>
        </div>
      ):(
        dayEntries.map(e=>{
          const moodObj=MOOD_OPTIONS.find(m=>m.v===e.mood)||MOOD_OPTIONS[2];
          return(
            <div key={e.id} style={{background:T.bgMid,border:`1px solid ${T.border}`,borderRadius:14,marginBottom:12,overflow:"hidden",animation:"fadeIn .25s ease"}}>
              {e.photo&&<img src={e.photo} alt="prato" style={{width:"100%",maxHeight:180,objectFit:"cover"}}/>}
              <div style={{padding:"12px 14px"}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:6}}>
                  <div>
                    <p style={{margin:0,fontSize:10,color:T.gold,fontFamily:"monospace",letterSpacing:1,textTransform:"uppercase"}}>{e.time} · {e.meal==="outro"?e.customMeal:e.meal||"Refeição"}</p>
                    <p style={{margin:"4px 0 0",fontSize:14,color:T.text,lineHeight:1.5}}>{e.desc}</p>
                  </div>
                  <span style={{fontSize:22,marginLeft:8}}>{moodObj.e}</span>
                </div>

                {/* Fome / Saciedade badges */}
                <div style={{display:"flex",gap:6,marginTop:8,flexWrap:"wrap"}}>
                  <span style={{fontSize:10,fontFamily:"monospace",padding:"3px 8px",borderRadius:20,background:T.bgLight,color:T.muted,border:`1px solid ${T.border}`}}>
                    Fome: {HUNGER_LABELS[e.hunger]}
                  </span>
                  <span style={{fontSize:10,fontFamily:"monospace",padding:"3px 8px",borderRadius:20,background:T.bgLight,color:T.muted,border:`1px solid ${T.border}`}}>
                    Saciedade: {SATIETY_LABELS[e.satiety]}
                  </span>
                  {e.obs&&<span style={{fontSize:10,fontFamily:"monospace",padding:"3px 8px",borderRadius:20,background:T.bgLight,color:T.muted,border:`1px solid ${T.border}`,maxWidth:"100%",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>
                    {e.obs}
                  </span>}
                </div>

                {/* Actions */}
                <div style={{display:"flex",gap:8,marginTop:10}}>

async function callClaude(messages,system=""){
  const body={model:"claude-sonnet-4-20250514",max_tokens:1000,messages};
  if(system)body.system=system;
  const r=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(body)});
  const d=await r.json();
  return d.content?.find(b=>b.type==="text")?.text||"";
}

function ChatTab({patient,T}){
  const [msgs,setMsgs]=useState([{role:"assistant",content:`Oi, ${patient.name.split(" ")[0]}! Sou a IA do Dr. Andre Aragao. Como posso te ajudar?`}]);
  const [input,setInput]=useState("");
  const [loading,setLoading]=useState(false);
  const bottomRef=useRef();
  useEffect(()=>{bottomRef.current?.scrollIntoView({behavior:"smooth"});},[msgs]);
  async function send(){
    const text=input.trim();if(!text||loading)return;
    setInput("");const next=[...msgs,{role:"user",content:text}];setMsgs(next);setLoading(true);
    const plan=patient.plan.map(m=>`${m.meal}: ${m.options[0].items.slice(0,2).join(", ")}`).join(" | ");
    const system=`Voce e a IA do nutricionista Andre Aragao. Paciente: ${patient.name}. Objetivo: ${patient.goal}. ${patient.kcal} kcal/dia. Plano: ${plan}. Responda em portugues, direto e empatico. Maximo 3 paragrafos.`;
    const reply=await callClaude(next.map(m=>({role:m.role,content:m.content})),system);
    setMsgs(p=>[...p,{role:"assistant",content:reply}]);setLoading(false);
  }
  return(
    <div style={{display:"flex",flexDirection:"column",height:"calc(100vh - 130px)"}}>
      <div style={{flex:1,overflowY:"auto",padding:"0 14px 10px"}}>
        {msgs.map((m,i)=><div key={i} style={{display:"flex",justifyContent:m.role==="user"?"flex-end":"flex-start",marginBottom:10}}><div style={{maxWidth:"80%",background:m.role==="user"?T.gold:T.bgMid,color:m.role==="user"?"#0D1B2A":T.text,borderRadius:m.role==="user"?"16px 16px 4px 16px":"16px 16px 16px 4px",padding:"10px 14px",fontSize:14,lineHeight:1.6,border:m.role==="assistant"?`1px solid ${T.border}`:"none"}}>{m.content}</div></div>)}
        {loading&&<div style={{display:"flex",marginBottom:10}}><div style={{background:T.bgMid,border:`1px solid ${T.border}`,borderRadius:"16px 16px 16px 4px",padding:"12px 16px",display:"flex",gap:4}}>{[0,1,2].map(i=><div key={i} style={{width:6,height:6,borderRadius:"50%",background:T.muted,animation:`bounce 1.2s ${i*0.2}s infinite`}}/>)}</div></div>}
        <div ref={bottomRef}/>
      </div>
      <div style={{padding:"10px 14px",borderTop:`1px solid ${T.border}`,background:T.bg,display:"flex",gap:8}}>
        <input value={input} onChange={e=>setInput(e.target.value)} onKeyDown={e=>e.key==="Enter"&&send()} placeholder="Pergunte sobre seu plano..." style={{flex:1,background:T.bgMid,border:`1px solid ${T.border}`,borderRadius:24,padding:"10px 16px",color:T.text,fontSize:14,outline:"none"}} onFocus={e=>e.target.style.borderColor=T.gold} onBlur={e=>e.target.style.borderColor=T.border}/>
        <button onClick={send} disabled={loading||!input.trim()} style={{width:42,height:42,borderRadius:"50%",background:input.trim()?T.gold:T.bgLight,border:"none",color:input.trim()?"#0D1B2A":T.muted,fontSize:18,cursor:input.trim()?"pointer":"default",flexShrink:0}}>→</button>
      </div>
    </div>
  );
}

      <div style={{position:"fixed",bottom:0,left:0,right:0,zIndex:50,background:T.bgMid,borderTop:`1px solid ${T.border}`,padding:"8px 0 14px"}}>
        <div style={{display:"flex",justifyContent:"center",gap:2,maxWidth:640,margin:"0 auto",padding:"0 6px"}}>
          {TABS.map(t=><button key={t.id} onClick={()=>setTab(t.id)} style={{flex:1,background:tab===t.id?`${T.gold}18`:"none",border:tab===t.id?`1px solid ${T.gold}40`:"1px solid transparent",borderRadius:10,cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:3,padding:"5px 4px",color:tab===t.id?T.gold:T.muted}}>
            <span style={{fontSize:16}}>{t.icon}</span>
            <span style={{fontSize:8,fontFamily:"monospace",fontWeight:tab===t.id?700:400,whiteSpace:"nowrap"}}>{t.label}</span>
          </button>)}
        </div>
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
