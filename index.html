// ─── helpers ─────────────────────────────────────────────────────────────────
function s(T,...styles){return Object.assign({fontFamily:"Georgia,serif"},...styles);}

function Btn({children,onClick,variant="primary",style={},T,disabled}){
  const bg=variant==="primary"?T.gold:variant==="danger"?T.danger:"transparent";
  const col=variant==="primary"?"#0D1B2A":"#fff";
  const bor=variant==="ghost"?`1px solid ${T.gold}`:"none";
  return h("button",{onClick,disabled,style:{background:bg,color:col,border:bor,borderRadius:10,padding:"10px 18px",fontSize:13,fontWeight:700,cursor:disabled?"not-allowed":"pointer",opacity:disabled?0.5:1,...style}},children);
}

function Input({value,onChange,placeholder,type="text",style={},T,onKeyDown}){
  return h("input",{value,onChange,placeholder,type,onKeyDown,style:{background:T.bgLight,border:`1px solid ${T.border}`,borderRadius:10,padding:"11px 14px",color:T.text,fontSize:14,outline:"none",width:"100%",boxSizing:"border-box",...style},
    onFocus:e=>e.target.style.borderColor=T.gold,
    onBlur:e=>e.target.style.borderColor=T.border});
}

function Label({children,T}){return h("p",{style:{margin:"0 0 6px",fontSize:10,color:T.gold,fontFamily:"monospace",letterSpacing:2,textTransform:"uppercase"}},children);}

function Card({children,style={},T}){
  return h("div",{style:{background:T.bgMid,border:`1px solid ${T.border}`,borderRadius:14,position:"relative",overflow:"hidden",...style}},
    h("div",{style:{position:"absolute",left:0,top:0,bottom:0,width:3,background:T.gold}}),
    children);
}

// ─── MealCard ────────────────────────────────────────────────────────────────
function MealCard({meal,T,isCurrent,isPast}){
  const [open,setOpen]=useState(isCurrent);
  const [sel,setSel]=useState(0);
  const multi=meal.options.length>1;
  const cur=meal.options[sel];

  const borderColor=isCurrent?T.gold:isPast?`${T.success}60`:`${T.border}`;
  const bgColor=isCurrent?`${T.gold}0A`:isPast?`${T.success}06`:T.bgMid;
  const accentBar=isCurrent?T.gold:isPast?T.success:T.border;

  return h("div",{style:{background:bgColor,border:`1px solid ${borderColor}`,borderRadius:16,marginBottom:10,overflow:"hidden",transition:"all .2s",position:"relative"}},
    // Barra lateral colorida
    h("div",{style:{position:"absolute",left:0,top:0,bottom:0,width:3,background:accentBar,borderRadius:"3px 0 0 3px"}}),
    h("div",{style:{padding:"14px 16px 12px 18px",cursor:"pointer"},onClick:()=>multi&&setOpen(!open)},
      h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}},
        h("div",{style:{flex:1}},
          h("div",{style:{display:"flex",alignItems:"center",gap:8,marginBottom:3}},
            h("span",{style:{fontSize:10,color:isCurrent?T.gold:T.muted,fontFamily:"monospace",letterSpacing:2,textTransform:"uppercase",fontWeight:isCurrent?700:400}},meal.time),
            isCurrent&&h("span",{style:{fontSize:9,background:T.gold,color:"#0D1B2A",padding:"2px 7px",borderRadius:20,fontFamily:"monospace",fontWeight:700,letterSpacing:1}},"AGORA")
          ),
          h("h3",{style:{margin:0,color:isPast?T.muted:T.text,fontSize:15,fontWeight:700,textDecoration:isPast?"line-through":"none",textDecorationColor:`${T.muted}60`}},meal.meal),
          meal.note&&h("p",{style:{margin:"3px 0 0",fontSize:11,color:T.muted,fontStyle:"italic",lineHeight:1.4}},meal.note)
        ),
        multi&&h("div",{style:{color:T.muted,fontSize:11,display:"flex",flexDirection:"column",alignItems:"flex-end",gap:4}},
          h("svg",{width:14,height:14,viewBox:"0 0 24 24",fill:"none",stroke:"currentColor",strokeWidth:2,style:{transform:open?"rotate(180deg)":"none",transition:"0.2s",color:isCurrent?T.gold:T.muted}},
            h("polyline",{points:"6 9 12 15 18 9"})
          ),
          !open&&h("span",{style:{fontSize:9,fontFamily:"monospace",color:T.muted}},`${meal.options.length} opções`)
        )
      )
    ),
    (open||!multi)&&h("div",{style:{padding:"0 16px 14px 18px",borderTop:`1px solid ${T.border}`}},
      multi&&h("div",{style:{display:"flex",flexWrap:"wrap",gap:5,margin:"12px 0 10px"}},
        ...meal.options.map((o,i)=>h("button",{key:i,onClick:e=>{e.stopPropagation();setSel(i);},style:{padding:"4px 12px",borderRadius:20,fontSize:10,fontFamily:"monospace",cursor:"pointer",border:`1px solid ${sel===i?T.gold:T.border}`,background:sel===i?T.gold:"transparent",color:sel===i?"#0D1B2A":T.muted,fontWeight:sel===i?700:400,transition:"all .15s"}},o.label))
      ),
      h("ul",{style:{margin:multi?"0":"12px 0 0",paddingLeft:16}},
        ...cur.items.map((item,i)=>h("li",{key:i,style:{color:T.muted,fontSize:13,marginBottom:4,lineHeight:1.5}},item))
      )
    )
  );
}

// ─── PlanTab ──────────────────────────────────────────────────────────────────
function PlanTab({patient,T,currentIdx}){
  const now=new Date();
  const nowMin=now.getHours()*60+now.getMinutes();
  const times=patient.plan.map(m=>{const[hh,mm]=m.time.split(":").map(Number);return hh*60+mm;});
  if(currentIdx===undefined){
    currentIdx=times.findIndex((t,i)=>{const next=times[i+1]||24*60;return nowMin>=t&&nowMin<next;});
    if(nowMin<times[0])currentIdx=-1;
  }
  const currentMeal=patient.plan[currentIdx]||patient.plan[0];

  return h("div",{style:{padding:"0 0 10px"}},

    // Nota clínica
    patient.note&&h("div",{style:{margin:"16px 16px 0",background:T.bgMid,border:`1px solid ${T.border}`,borderRadius:14,padding:"12px 14px",display:"flex",gap:10,alignItems:"flex-start"}},
      h("svg",{width:14,height:14,viewBox:"0 0 24 24",fill:"none",stroke:T.gold,strokeWidth:2,style:{flexShrink:0,marginTop:1}},
        h("circle",{cx:12,cy:12,r:10}),h("line",{x1:12,y1:8,x2:12,y2:12}),h("line",{x1:12,y1:16,x2:"12.01",y2:16})
      ),
      h("p",{style:{margin:0,fontSize:12,color:T.muted,fontStyle:"italic",lineHeight:1.6}},patient.note)
    ),

    // Card de destaque — refeição atual
    currentMeal&&h("div",{style:{margin:"16px 16px 0",borderRadius:18,padding:"20px",position:"relative",overflow:"hidden",background:"linear-gradient(135deg,#1A2E42 0%,#0D1B2A 100%)"}},
      h("div",{style:{position:"absolute",top:-20,right:-20,width:100,height:100,borderRadius:"50%",background:"rgba(201,168,76,0.08)",pointerEvents:"none"}}),
      h("div",{style:{position:"absolute",bottom:-30,right:20,width:60,height:60,borderRadius:"50%",background:"rgba(201,168,76,0.05)",pointerEvents:"none"}}),
      h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:14}},
        h("div",null,
          h("div",{style:{display:"flex",alignItems:"center",gap:8,marginBottom:6}},
            currentIdx>=0&&h("span",{style:{fontSize:9,background:"#C9A84C",color:"#0D1B2A",padding:"3px 9px",borderRadius:20,fontFamily:"monospace",fontWeight:700,letterSpacing:1}},"AGORA"),
            h("span",{style:{fontSize:11,color:"rgba(201,168,76,0.7)",fontFamily:"monospace",letterSpacing:1}},currentMeal.time)
          ),
          h("h2",{style:{margin:0,fontSize:22,fontWeight:700,color:"#F0EAD6",letterSpacing:-0.3}},currentMeal.meal)

// ─── TodayTab ────────────────────────────────────────────────────────────────
function TodayTab({patient,T}){
  const ck=`hoje_${patient.id}_${todayStr()}`;
  const wk=`agua_${patient.id}_${todayStr()}`;
  const [checked,setChecked]=useState(()=>store.get(ck)||{});
  const [water,setWater]=useState(()=>store.get(wk)||0);
  function toggle(m){const n={...checked,[m]:!checked[m]};setChecked(n);store.set(ck,n);}
  function addWater(ml){const n=Math.min(water+ml,patient.waterGoal+1000);setWater(n);store.set(wk,n);}
  const done=patient.plan.filter(m=>checked[m.meal]).length;
  const pct=Math.round((done/patient.plan.length)*100);
  const wpct=Math.min(Math.round((water/patient.waterGoal)*100),100);
  return h("div",{style:{padding:"0 14px 80px"}},
    h("div",{style:{display:"flex",gap:10,marginBottom:14}},
      ...[{label:"Refeições",value:`${done}/${patient.plan.length}`,pct,color:pct===100?T.success:T.gold},{label:"Água",value:`${(water/1000).toFixed(1)}L`,pct:wpct,color:wpct>=100?T.success:T.info}].map((s,i)=>
        h("div",{key:i,style:{flex:1,background:T.bgMid,border:`1px solid ${T.border}`,borderRadius:12,padding:"10px 12px"}},
          h("p",{style:{margin:0,fontSize:10,color:T.muted,fontFamily:"monospace",textTransform:"uppercase"}},s.label),
          h("p",{style:{margin:"0 0 6px",fontSize:15,color:s.color,fontWeight:700,fontFamily:"monospace"}},s.value),
          h("div",{style:{height:4,background:T.bgLight,borderRadius:2,overflow:"hidden"}},
            h("div",{style:{width:`${s.pct}%`,height:"100%",background:s.color,borderRadius:2,transition:"width .4s"}})
          )
        )
      )
    ),
    ...patient.plan.map(meal=>
      h("div",{key:meal.meal,onClick:()=>toggle(meal.meal),style:{display:"flex",alignItems:"center",gap:12,background:checked[meal.meal]?`${T.success}18`:T.bgMid,border:`1px solid ${checked[meal.meal]?T.success:T.border}`,borderRadius:12,padding:"12px 14px",cursor:"pointer",marginBottom:10,transition:"all .2s"}},
        h("div",{style:{width:22,height:22,borderRadius:"50%",flexShrink:0,border:`2px solid ${checked[meal.meal]?T.success:T.border}`,background:checked[meal.meal]?T.success:"transparent",display:"flex",alignItems:"center",justifyContent:"center",fontSize:12,color:"#fff"}},checked[meal.meal]?"✓":""),
        h("div",{style:{flex:1}},
          h("p",{style:{margin:0,fontSize:10,color:T.gold,fontFamily:"monospace",textTransform:"uppercase"}},meal.time),
          h("p",{style:{margin:"1px 0 0",fontSize:14,color:checked[meal.meal]?T.muted:T.text,textDecoration:checked[meal.meal]?"line-through":"none"}},meal.meal)
        )
      )
    ),
    h(Card,{T,style:{marginTop:18,padding:"14px 18px"}},
      h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}},
        h("p",{style:{margin:0,fontSize:13,color:T.text,fontWeight:700}},"Hidratação"),
        h("p",{style:{margin:0,fontSize:22,color:water>=patient.waterGoal?T.success:T.gold,fontFamily:"monospace",fontWeight:700}},`${(water/1000).toFixed(1)}L`)
      ),
      h("div",{style:{height:8,background:T.bgLight,borderRadius:4,overflow:"hidden",marginBottom:12}},
        h("div",{style:{width:`${wpct}%`,height:"100%",background:water>=patient.waterGoal?T.success:T.info,borderRadius:4,transition:"width .4s"}})
      ),
      h("div",{style:{display:"flex",gap:8}},
        ...[200,300,500].map(ml=>h("button",{key:ml,onClick:()=>addWater(ml),style:{flex:1,padding:"8px 0",background:T.bgLight,border:`1px solid ${T.border}`,borderRadius:8,color:T.text,fontSize:13,cursor:"pointer",fontFamily:"monospace"}},`+${ml}ml`)),
        h("button",{onClick:()=>{setWater(0);store.set(wk,0);},style:{padding:"8px 12px",background:"transparent",border:`1px solid ${T.danger}`,borderRadius:8,color:T.danger,fontSize:12,cursor:"pointer"}},"✕")
      )
    )
  );
}
